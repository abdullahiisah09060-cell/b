<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Maintenance — BluePay</title>
  <link rel="stylesheet" href="global.css">
  <style>
    .m-container { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    .m-icon { width: 100px; height: 100px; background: rgba(212,175,55,0.1); border-radius: 50%; color: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 30px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
  </style>
</head>
<body data-page="maintenance">
  <div class="m-container">
    <div class="m-icon"><i class="fa-solid fa-gears"></i></div>
    <h1 style="font-size: 42px; margin-bottom: 15px;">Securing the Vaults</h1>
    <p style="max-width: 500px; margin: 0 auto 40px; font-size: 18px; color: var(--muted2);">BluePay is currently undergoing scheduled system optimization to improve your investment experience. We'll be back online shortly.</p>
    <div class="card" style="padding: 15px 30px; border-color: var(--gold);">
      <p style="font-size: 14px; font-weight: 700; color: var(--gold);">ESTIMATED UPTIME: <span id="uptime">Checking...</span></p>
    </div>
    <div class="flex" style="gap: 20px; margin-top: 50px;">
      <a href="mailto:support@bluepay.com" style="color: var(--blue2); font-weight: 700;">Contact Support</a>
      <span style="color: var(--border);">|</span>
      <a href="#" style="color: var(--blue2); font-weight: 700;">Twitter Updates</a>
    </div>
  </div>

  <script src="app.js" type="module"></script>
  <script type="module">
    import { db } from './firebase-config.js';
    import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Auto-redirect if maintenance is turned off
    onSnapshot(doc(db, "settings", "global"), (snap) => {
      if (snap.exists()) {
        const data = snap.data();
        if (!data.maintenanceMode) {
          window.location.href = "index.html";
        }
        document.getElementById('uptime').innerText = data.expectedUptime || "Soon";
      }
    });
  </script>
</body>
</html>
