<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance | BluePay</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .m-wrap { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .m-icon { font-size: 80px; color: var(--gold); margin-bottom: 30px; animation: pulse 2s infinite; }
    </style>
</head>
<body>
    <div class="m-wrap reveal">
        <i class="fa-solid fa-vault m-icon"></i><h1>Upgrading the Vault</h1>
        <p style="max-width: 500px; margin: 20px auto 40px;">BluePay is undergoing a security upgrade. We'll be back online shortly.</p>
        <div class="card" style="border-color: var(--gold); padding: 15px 40px;"><p style="font-weight: 800; color: var(--gold);">ESTIMATED RETURN: <span id="u-text">Soon</span></p></div>
    </div>
    <script type="module">
        import { db } from './firebase-config.js'; import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        onSnapshot(doc(db, "settings", "global"), snap => {
            if(snap.exists() && !snap.data().maintenanceMode) window.location.href = 'dashboard.html';
            document.getElementById('u-text').innerText = snap.data().expectedUptime || "Within 2 Hours";
        });
    </script>
</body>
</html>
