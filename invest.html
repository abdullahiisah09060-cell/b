<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invest | BluePay Vault</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .tabs { display: flex; gap: 30px; border-bottom: 1px solid var(--border); margin-bottom: 40px; }
        .tab-btn { padding: 15px 5px; font-weight: 700; color: var(--muted2); cursor: pointer; position: relative; }
        .tab-btn.active { color: var(--blue2); }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: var(--blue2); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body data-page="invest">
    <div id="global-loader"><div class="spinner"></div></div>
    <aside class="sidebar"></aside>
    <header class="mobile-header"></header>

    <main class="main-content">
        <div class="flex-between reveal" style="margin-bottom: 40px; flex-wrap: wrap; gap: 20px;">
            <div>
                <h1>Investment Hub</h1>
                <p>Available for Investment: <b id="user-bal-top" class="gold-text">₦0.00</b></p>
            </div>
            <a href="deposit.html" class="btn btn-outline" style="min-height: 40px; padding: 0 20px;">+ Fund Wallet</a>
        </div>

        <div class="tabs reveal">
            <div class="tab-btn active" onclick="switchTab('new')">Subscribe New</div>
            <div class="tab-btn" onclick="switchTab('active')">My Portfolios</div>
        </div>

        <!-- TAB: Subscribe New -->
        <div id="tab-new" class="tab-content active">
            <div id="plans-grid" class="grid-2 reveal">
                <!-- Injected via JS -->
            </div>
        </div>

        <!-- TAB: My Portfolios -->
        <div id="tab-active" class="tab-content">
            <div id="active-invest-list" class="grid reveal">
                <!-- Injected via JS -->
            </div>
        </div>
    </main>

    <nav class="bottom-nav"></nav>

    <script src="app.js" type="module"></script>
    <script type="module">
        import { auth, db, INVESTMENT_PLANS, fmtN, calculateROI, requireAuth, updateWallet } from './firebase-config.js';
        import { initAppShell, showConfirm, showToast, toggleLoader } from './components.js';
        import { collection, query, where, onSnapshot, serverTimestamp, addDoc, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        requireAuth(user => {
            initAppShell('invest');
            let currentBal = 0;

            // Balance Sync
            onSnapshot(doc(db, "users", user.uid), snap => {
                currentBal = snap.data().balance;
                document.getElementById('user-bal-top').innerText = fmtN(currentBal);
            });

            // Render Plans
            const grid = document.getElementById('plans-grid');
            grid.innerHTML = INVESTMENT_PLANS.map(p => `
                <div class="card" style="display:flex; flex-direction:column; border-color: ${p.roiPercent > 40 ? 'var(--gold)' : 'var(--border)'}">
                    <div class="flex-between">
                        <span class="badge ${p.roiPercent > 40 ? 'badge-warning' : 'badge-pending'}">${p.name}</span>
                        <h2 class="grad-text">${p.roiPercent}% ROI</h2>
                    </div>
                    <div style="margin: 25px 0;">
                        <div class="flex-between" style="font-size: 13px; margin-bottom: 10px;"><span>Duration</span><b>${p.durationDays} Days</b></div>
                        <div class="flex-between" style="font-size: 13px; margin-bottom: 10px;"><span>Min Entry</span><b>${fmtN(p.min)}</b></div>
                    </div>
                    <div class="auth-input-group">
                        <label>Investment Amount (₦)</label>
                        <input type="number" id="amt-${p.id}" value="${p.min}" min="${p.min}" max="${p.max}">
                    </div>
                    <button class="btn btn-primary" onclick="confirmInvestment('${p.id}')" style="width: 100%; margin-top: auto;">Subscribe Plan</button>
                </div>
            `).join('');

            window.confirmInvestment = async (id) => {
                const plan = INVESTMENT_PLANS.find(x => x.id === id);
                const amt = parseFloat(document.getElementById(`amt-${id}`).value);

                if (amt < plan.min || amt > plan.max) return showToast(`Invalid amount for ${plan.name} plan`, "error");
                if (amt > currentBal) return showToast("Insufficient wallet balance", "error");

                const roi = calculateROI(amt, id);

                showConfirm({
                    title: `Subscribe ${plan.name}?`,
                    message: `Invest ${fmtN(amt)} for ${plan.durationDays} days. Expected total payout: ${fmtN(roi.total)}.`,
                    confirmText: "Invest Now",
                    onConfirm: async () => {
                        try {
                            // 1. Debit & Log
                            await updateWallet(user.uid, amt, 'debit', {
                                type: 'investment',
                                description: `Subscription: ${plan.name} Plan`,
                                status: 'completed'
                            });

                            // 2. Create Portfolio Record
                            await addDoc(collection(db, "investments"), {
                                uid: user.uid,
                                planId: id,
                                planName: plan.name,
                                principal: amt,
                                dailyYield: roi.daily,
                                totalYield: roi.profit,
                                duration: plan.durationDays,
                                status: "active",
                                claimCount: 0,
                                lastClaimed: null,
                                createdAt: serverTimestamp(),
                                maturesAt: new Date(Date.now() + plan.durationDays * 24 * 60 * 60 * 1000)
                            });

                            showToast(`${plan.name} Investment Activated!`, "success");
                            window.switchTab('active');
                        } catch (e) { showToast(e, "error"); }
                    }
                });
            };

            // Active Portfolios Listener
            const qAct = query(collection(db, "investments"), where("uid", "==", user.uid), where("status", "==", "active"));
            onSnapshot(qAct, snap => {
                const list = document.getElementById('active-invest-list');
                if (snap.empty) {
                    list.innerHTML = `<div class="card" style="text-align: center; padding: 60px 0;"><p>You have no active investments.</p></div>`;
                    return;
                }
                list.innerHTML = snap.docs.map(docSnap => {
                    const inv = docSnap.data();
                    const last = inv.lastClaimed ? inv.lastClaimed.toDate() : 0;
                    const hoursPassed = (Date.now() - last) / (1000 * 60 * 60);
                    const canClaim = hoursPassed >= 24;
                    const countdown = canClaim ? "" : `Next in ${Math.ceil(24 - hoursPassed)}h`;

                    return `
                        <div class="card">
                            <div class="flex-between" style="margin-bottom: 20px;">
                                <div><h4 style="font-size: 18px;">${inv.planName} Plan</h4><p class="text-micro">${fmtN(inv.principal)} Principal</p></div>
                                <span class="badge badge-success">RUNNING</span>
                            </div>
                            <div class="flex-between">
                                <div><p class="text-micro">DAILY RETURNS</p><h3 style="color: var(--green);">${fmtN(inv.dailyYield)}</h3></div>
                                ${canClaim ? 
                                    `<button class="btn btn-gold" style="min-height: 40px; padding: 0 20px; font-size: 12px;" onclick="processClaim('${docSnap.id}')">Claim ROI</button>` :
                                    `<div style="text-align:right;"><span class="badge badge-muted">${countdown}</span></div>`
                                }
                            </div>
                        </div>
                    `;
                }).join('');
            });

            window.processClaim = async (invId) => {
                const invRef = doc(db, "investments", invId);
                const invSnap = await getDoc(invRef);
                const invData = invSnap.data();

                try {
                    // Atomic credit
                    await updateWallet(user.uid, invData.dailyYield, 'credit', {
                        type: 'daily_claim',
                        description: `ROI Claim: ${invData.planName}`,
                        status: 'completed'
                    });

                    const isLastClaim = (invData.claimCount + 1) >= invData.duration;
                    
                    // Update Portfolio
                    await updateDoc(invRef, {
                        lastClaimed: serverTimestamp(),
                        claimCount: invData.claimCount + 1,
                        status: isLastClaim ? "matured" : "active"
                    });

                    // If matured, return principal
                    if (isLastClaim) {
                        await updateWallet(user.uid, invData.principal, 'credit', {
                            type: 'return',
                            description: `Matured Capital: ${invData.planName}`,
                            status: 'completed'
                        });
                        showToast("Plan Matured! Principal returned to wallet.", "success");
                    } else {
                        showToast(`Daily ROI of ${fmtN(invData.dailyYield)} claimed!`, "success");
                    }
                } catch (e) { showToast("Claim failed. Try later.", "error"); }
            };

            window.switchTab = (id) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                event.target.classList.add('active');
                document.getElementById(`tab-${id}`).classList.add('active');
            };
        });
    </script>
</body>
</html>
