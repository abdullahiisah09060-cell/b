<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Plans — BluePay</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="invest">
    <div id="global-loader"><div class="spinner"></div></div>
    <aside class="sidebar"></aside>
    <header class="mobile-header"></header>

    <main class="main-content">
        <div class="reveal" style="margin-bottom: 40px;">
            <h1>Grow Your Wealth</h1>
            <p style="color: var(--muted2);">Select a plan and start earning daily ROI instantly.</p>
        </div>

        <div class="grid" id="plans-container" style="grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px;">
            <!-- Plans injected here -->
        </div>

        <div class="reveal" style="margin-top: 60px;">
            <h3 style="margin-bottom: 25px;">My Portfolios</h3>
            <div id="active-investments" class="grid-2">
                <p style="color: var(--muted2);">No active investments.</p>
            </div>
        </div>
    </main>

    <nav class="bottom-nav"></nav>

    <script src="app.js" type="module"></script>
    <script type="module">
        import { auth, db, INVESTMENT_PLANS, fmtN, toast } from './firebase-config.js';
        import { collection, addDoc, getDoc, getDocs, updateDoc, doc, query, where, serverTimestamp, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { showConfirm, toggleLoader } from './components.js';

        const cont = document.getElementById('plans-container');
        cont.innerHTML = INVESTMENT_PLANS.map(p => `
            <div class="card reveal" style="display:flex; flex-direction:column; border-color: ${p.roiPercent > 40 ? 'var(--border-gold)' : 'var(--border)'}">
                <div class="flex-between">
                    <span class="badge ${p.roiPercent > 40 ? 'badge-warning' : 'badge-pending'}">${p.name.toUpperCase()}</span>
                    <h3 class="gold-text">${p.roiPercent}% ROI</h3>
                </div>
                <div style="margin: 25px 0;">
                    <p style="font-size: 13px; color: var(--muted2);">Duration: <b>${p.durationDays} Days</b></p>
                    <p style="font-size: 13px; color: var(--muted2);">Daily Returns: <b>${(p.roiPercent/p.durationDays).toFixed(2)}%</b></p>
                </div>
                <div class="auth-input-group">
                    <label>Investment Amount</label>
                    <input type="number" id="amt-${p.id}" value="${p.min}" min="${p.min}" max="${p.max === Infinity ? '' : p.max}">
                </div>
                <button class="btn btn-primary" onclick="processInvest('${p.id}')" style="width:100%; margin-top:auto;">Start Plan</button>
            </div>
        `).join('');

        window.processInvest = async (planId) => {
            const plan = INVESTMENT_PLANS.find(x => x.id === planId);
            const amt = parseFloat(document.getElementById(`amt-${planId}`).value);

            showConfirm({
                title: `Invest in ${plan.name}`,
                message: `You are about to invest ${fmtN(amt)}. Your balance will be debited and you will start earning ROI every 24 hours.`,
                onConfirm: async () => {
                    toggleLoader(true);
                    try {
                        const userSnap = await getDocs(query(collection(db, "users"), where("uid", "==", auth.currentUser.uid)));
                        const userData = userSnap.docs[0].data();
                        
                        if (userData.balance < amt) throw new Error("Insufficient balance.");

                        await addDoc(collection(db, "investments"), {
                            uid: auth.currentUser.uid,
                            planId: planId,
                            planName: plan.name,
                            amount: amt,
                            dailyROI: (amt * (plan.roiPercent/100)) / plan.durationDays,
                            status: "active",
                            totalEarned: 0,
                            lastClaimed: serverTimestamp(),
                            createdAt: serverTimestamp(),
                            maturesAt: new Date(Date.now() + plan.durationDays * 24 * 60 * 60 * 1000)
                        });

                        await updateDoc(doc(db, "users", userSnap.docs[0].id), {
                            balance: userData.balance - amt,
                            totalInvested: userData.totalInvested + amt
                        });

                        toast("Investment successful!", "success");
                    } catch (err) {
                        toast(err.message, "error");
                    } finally {
                        toggleLoader(false);
                    }
                }
            });
        };

        // Real-time Active Investments with Claim Logic
        const q = query(collection(db, "investments"), where("uid", "==", auth.currentUser?.uid || ""), where("status", "==", "active"));
        onSnapshot(q, (snap) => {
            const cont = document.getElementById('active-investments');
            if (snap.empty) return;
            cont.innerHTML = snap.docs.map(docSnap => {
                const inv = docSnap.data();
                const last = inv.lastClaimed ? inv.lastClaimed.toDate() : new Date();
                const canClaim = (new Date() - last) > (24 * 60 * 60 * 1000);

                return `
                    <div class="card">
                        <div class="flex-between">
                            <h4>${inv.planName}</h4>
                            <span class="badge badge-success">ACTIVE</span>
                        </div>
                        <h2 style="margin: 15px 0;">${fmtN(inv.amount)}</h2>
                        <div class="flex-between">
                            <p style="font-size: 11px; color: var(--muted2);">EARNED: ${fmtN(inv.totalEarned)}</p>
                            ${canClaim ? 
                                `<button onclick="claimROI('${docSnap.id}')" class="btn btn-primary" style="padding: 8px 15px; font-size: 12px;">Claim ROI</button>` :
                                `<p style="font-size: 11px; color: var(--orange);">Next claim: 24h cycle</p>`
                            }
                        </div>
                    </div>
                `;
            }).join('');
        });

        window.claimROI = async (id) => {
            toggleLoader(true);
            try {
                const invRef = doc(db, "investments", id);
                const invSnap = await getDoc(invRef);
                const invData = invSnap.data();

                const userSnap = await getDocs(query(collection(db, "users"), where("uid", "==", auth.currentUser.uid)));
                const userData = userSnap.docs[0].data();

                await updateDoc(invRef, {
                    totalEarned: invData.totalEarned + invData.dailyROI,
                    lastClaimed: serverTimestamp()
                });

                await updateDoc(doc(db, "users", userSnap.docs[0].id), {
                    balance: userData.balance + invData.dailyROI,
                    totalEarned: userData.totalEarned + invData.dailyROI
                });

                toast(`Claimed ${fmtN(invData.dailyROI)} ROI!`, "success");
            } catch (err) {
                toast(err.message, "error");
            } finally {
                toggleLoader(false);
            }
        };
    </script>
</body>
</html>
