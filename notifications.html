<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications — BluePay</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="dashboard">
    <div id="global-loader"><div class="spinner"></div></div>
    <aside class="sidebar"></aside>
    <header class="mobile-header"></header>

    <main class="main-content">
        <div class="reveal" style="margin-bottom: 40px;">
            <h1>Alert Center</h1>
            <p style="color: var(--muted2);">Stay updated with your portfolio and platform news.</p>
        </div>

        <div id="notif-list" class="grid" style="gap: 15px;">
            <p style="text-align: center; color: var(--muted2); padding: 40px;">No notifications yet.</p>
        </div>
    </main>

    <nav class="bottom-nav"></nav>
    <script src="app.js" type="module"></script>
    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const q = query(collection(db, "notifications"), where("uid", "==", auth.currentUser?.uid || "void"), orderBy("createdAt", "desc"));
        onSnapshot(q, snap => {
            const cont = document.getElementById('notif-list');
            if(snap.empty) return;
            cont.innerHTML = snap.docs.map(doc => {
                const n = doc.data();
                return `
                    <div class="card reveal flex" style="gap: 20px; align-items: start;">
                        <div style="width: 40px; height: 40px; border-radius: 50%; background: var(--bg3); display: flex; align-items: center; justify-content: center; color: var(--blue2);"><i class="fa-solid fa-bell"></i></div>
                        <div>
                            <h4 style="margin-bottom: 5px;">${n.title}</h4>
                            <p style="font-size: 14px;">${n.message}</p>
                            <p style="font-size: 11px; margin-top: 10px; color: var(--muted);">Just now</p>
                        </div>
                    </div>
                `;
            }).join('');
        });
    </script>
</body>
</html>
