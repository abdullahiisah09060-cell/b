<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Inbox | BluePay</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="dashboard">
    <div id="global-loader"><div class="spinner"></div></div>
    <aside class="sidebar"></aside>
    <header class="mobile-header"></header>
    <main class="main-content">
        <div class="flex-between reveal" style="margin-bottom: 40px;"><h1>Notifications</h1><button id="mark-read" class="btn btn-outline" style="min-height: 40px; font-size: 13px;">Mark all read</button></div>
        <div id="n-list" class="grid reveal" style="gap: 12px;"></div>
    </main>
    <nav class="bottom-nav"></nav>
    <script src="app.js" type="module"></script>
    <script type="module">
        import { auth, db, timeAgo, requireAuth } from './firebase-config.js';
        import { initAppShell } from './components.js';
        import { collection, query, where, orderBy, onSnapshot, updateDoc, doc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        requireAuth(user => {
            initAppShell('dashboard');
            onSnapshot(query(collection(db, "notifications"), where("uid", "==", user.uid), orderBy("createdAt", "desc")), snap => {
                document.getElementById('n-list').innerHTML = snap.empty ? `<p style="text-align:center; padding:40px;">No alerts yet.</p>` : snap.docs.map(d => {
                    const n = d.data();
                    return `<div class="card flex" style="gap: 20px; align-items: start; background: ${n.read ? 'var(--bg2)' : 'var(--bg3)'}; border-left: 4px solid ${n.read ? 'transparent' : 'var(--blue2)'}; cursor: pointer;" onclick="markRead('${d.id}')"><div><h4 style="font-size: 15px;">${n.title}</h4><p style="font-size: 13px; margin-top: 5px;">${n.message}</p><p style="font-size: 10px; margin-top: 10px; opacity: 0.5;">${timeAgo(n.createdAt)}</p></div></div>`;
                }).join('');
            });
            window.markRead = (id) => updateDoc(doc(db, "notifications", id), { read: true });
            document.getElementById('mark-read').onclick = async () => {
                const q = query(collection(db, "notifications"), where("uid", "==", user.uid), where("read", "==", false));
                const snap = await getDocs(q); if(snap.empty) return;
                const batch = writeBatch(db); snap.docs.forEach(d => batch.update(d.ref, { read: true })); await batch.commit();
            };
        });
    </script>
</body>
</html>
