<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Identity | BluePay</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="flex-center" style="min-height: 100vh; padding: 20px;">
    <div class="card reveal" style="width: 100%; max-width: 440px; text-align: center; padding: 50px 40px;">
        <div style="font-size: 60px; color: var(--blue2); margin-bottom: 30px;"><i class="fa-solid fa-envelope-circle-check"></i></div>
        <h2>Check your inbox</h2>
        <p style="margin-bottom: 10px;">We've sent a verification link to:</p>
        <div id="user-email-display" style="font-weight: 800; font-size: 18px; color: white; margin-bottom: 35px;">...</div>
        
        <div style="background: var(--bg3); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 30px;">
            <div class="flex-center" style="gap: 15px;">
                <div class="spinner" style="width: 20px; height: 20px;"></div>
                <span style="font-size: 13px; font-weight: 700; color: var(--muted2);">WAITING FOR ACTIVATION...</span>
            </div>
        </div>

        <button id="resend-btn" class="btn btn-outline" style="width: 100%; margin-bottom: 20px;">Resend Verification Link</button>
        <p style="font-size: 12px;">Wrong email? <a href="#" onclick="logout()" class="gold-text">Sign Out</a></p>
    </div>

    <script src="app.js" type="module"></script>
    <script type="module">
        import { auth } from './firebase-config.js';
        import { sendEmailVerification, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { showToast } from './components.js';

        let resendCooldown = 0;

        auth.onAuthStateChanged(user => {
            if (!user) { window.location.href = 'login.html'; return; }
            if (user.emailVerified) { window.location.href = 'welcome.html'; return; }
            
            document.getElementById('user-email-display').innerText = user.email;

            // Real-time Poll
            const poll = setInterval(async () => {
                await user.reload();
                if (user.emailVerified) {
                    clearInterval(poll);
                    window.location.href = 'welcome.html';
                }
            }, 3000);
        });

        document.getElementById('resend-btn').onclick = async () => {
            if (resendCooldown > 0) return;
            try {
                await sendEmailVerification(auth.currentUser);
                showToast("Verification email resent!", "success");
                resendCooldown = 60;
                updateCooldown();
            } catch (err) { showToast(err.message, "error"); }
        };

        function updateCooldown() {
            const btn = document.getElementById('resend-btn');
            if (resendCooldown > 0) {
                btn.disabled = true;
                btn.innerText = `Wait ${resendCooldown}s...`;
                resendCooldown--;
                setTimeout(updateCooldown, 1000);
            } else {
                btn.disabled = false;
                btn.innerText = "Resend Verification Link";
            }
        }

        window.logout = () => signOut(auth).then(() => window.location.href = 'login.html');
    </script>
</body>
</html>
