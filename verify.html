<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email — BluePay</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="login">
    <div id="global-loader"><div class="spinner"></div></div>
    <div class="flex-center" style="min-height: 100vh; padding: 20px;">
        <div class="card reveal" style="width: 100%; max-width: 420px; text-align: center; padding: 60px 40px;">
            <div style="font-size: 70px; color: var(--blue2); margin-bottom: 30px;"><i class="fa-solid fa-envelope-circle-check"></i></div>
            <h2>Check Inbox</h2>
            <p style="color: var(--muted2); margin: 15px 0 40px;">A verification link has been sent to your email. Click the link to activate your portfolio.</p>
            
            <div style="background: var(--bg3); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 30px;">
                <div class="spinner" style="width: 20px; height: 20px; border-width: 2px; margin: 0 auto 10px;"></div>
                <p style="font-size: 12px; font-weight: 700;">WAITING FOR ACTIVATION...</p>
            </div>

            <button onclick="location.reload()" class="btn btn-outline" style="width: 100%;">I've Verified My Email</button>
        </div>
    </div>
    <script src="app.js" type="module"></script>
    <script type="module">
        import { auth } from './firebase-config.js';
        auth.onAuthStateChanged(user => {
            if(user?.emailVerified) window.location.href = 'welcome.html';
            setInterval(() => { user?.reload().then(() => { if(user.emailVerified) window.location.href = 'welcome.html'; }); }, 3000);
        });
    </script>
</body>
</html>
