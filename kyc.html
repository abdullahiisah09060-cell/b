<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYC Verification — BluePay</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="profile">
    <div id="global-loader"><div class="spinner"></div></div>
    <aside class="sidebar"></aside>
    <header class="mobile-header"></header>

    <main class="main-content">
        <div class="reveal" style="max-width: 600px; margin: 0 auto;">
            <h1>Identity Verification</h1>
            <p style="color: var(--muted2); margin-bottom: 30px;">Upload your government ID to unlock full account limits.</p>

            <div id="kyc-status-msg"></div>

            <div class="card reveal" id="kyc-form-card">
                <form id="kyc-form">
                    <div class="auth-input-group">
                        <label>ID Type</label>
                        <select id="id-type" required>
                            <option value="nin">National ID (NIN)</option>
                            <option value="voters">Voters Card</option>
                            <option value="passport">International Passport</option>
                        </select>
                    </div>
                    <div class="auth-input-group">
                        <label>ID Number</label>
                        <input type="text" id="id-number" placeholder="Enter ID Number" required>
                    </div>
                    <div class="auth-input-group">
                        <label>Upload Front View (Image)</label>
                        <input type="file" id="id-file" accept="image/*" required>
                    </div>
                    <button type="submit" id="kyc-submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">Submit for Review</button>
                </form>
            </div>
        </div>
    </main>

    <nav class="bottom-nav"></nav>

    <script src="app.js" type="module"></script>
    <script type="module">
        import { auth, db, toast, listenUser } from './firebase-config.js';
        import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { toggleLoader } from './components.js';

        listenUser(auth.currentUser?.uid || "", (user) => {
            const msg = document.getElementById('kyc-status-msg');
            const card = document.getElementById('kyc-form-card');
            
            if (user.kycStatus === 'pending') {
                msg.innerHTML = `<div class="card" style="border-color: var(--orange); text-align:center;"><h3 style="color:var(--orange)">Verification Pending</h3><p>Our team is reviewing your documents.</p></div>`;
                card.style.display = 'none';
            } else if (user.kycStatus === 'verified') {
                msg.innerHTML = `<div class="card" style="border-color: var(--green); text-align:center;"><h3 style="color:var(--green)">Account Verified</h3><p>Full features unlocked.</p></div>`;
                card.style.display = 'none';
            }
        });

        document.getElementById('kyc-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('kyc-submit');
            toggleLoader(true, btn);

            try {
                // In a real app, upload to Storage. Here we simulate submission.
                await setDoc(doc(db, "kyc", auth.currentUser.uid), {
                    uid: auth.currentUser.uid,
                    idType: document.getElementById('id-type').value,
                    idNumber: document.getElementById('id-number').value,
                    status: "pending",
                    submittedAt: serverTimestamp()
                });

                await setDoc(doc(db, "users", auth.currentUser.uid), { kycStatus: "pending" }, { merge: true });
                toast("KYC Submitted!", "success");
            } catch (err) {
                toast(err.message, "error");
            } finally {
                toggleLoader(false, btn);
            }
        };
    </script>
</body>
</html>
