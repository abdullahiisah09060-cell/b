<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Identity Verification | BluePay</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .upload-zone { border: 2px dashed var(--border); padding: 40px; text-align: center; border-radius: 16px; cursor: pointer; transition: 0.3s; position: relative; }
        .upload-zone:hover { border-color: var(--blue2); background: var(--bg3); }
        .preview-box { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 14px; display: none; }
    </style>
</head>
<body data-page="profile">
    <div id="global-loader"><div class="spinner"></div></div>
    <aside class="sidebar"></aside>
    <header class="mobile-header"></header>

    <main class="main-content">
        <div class="reveal" style="max-width: 800px; margin: 0 auto;">
            <h1>Identity Verification</h1>
            <p>Upload government-issued ID to unlock higher withdrawal limits.</p>

            <div id="kyc-status-area" style="margin: 30px 0;"></div>

            <div id="kyc-form-card" class="card reveal" style="display: none;">
                <form id="kyc-form">
                    <div class="grid-2">
                        <div class="auth-input-group"><label>Identification Type</label>
                            <select id="k-type" required><option value="nin">National ID (NIN)</option><option value="voters">Voters Card (PVC)</option><option value="license">Driver's License</option><option value="passport">International Passport</option></select>
                        </div>
                        <div class="auth-input-group"><label>ID Document Number</label><input type="text" id="k-num" placeholder="Enter ID Number" required></div>
                    </div>
                    <div class="grid-2" style="margin-top: 20px;">
                        <div>
                            <label class="text-micro" style="margin-bottom: 10px; display: block;">ID Card Front</label>
                            <div class="upload-zone" onclick="document.getElementById('file-front').click()">
                                <i class="fa-solid fa-camera"></i><p>Upload Front</p><img id="p-front" class="preview-box">
                                <input type="file" id="file-front" hidden accept="image/*">
                            </div>
                        </div>
                        <div>
                            <label class="text-micro" style="margin-bottom: 10px; display: block;">Selfie with ID</label>
                            <div class="upload-zone" onclick="document.getElementById('file-selfie').click()">
                                <i class="fa-solid fa-user-shield"></i><p>Upload Selfie</p><img id="p-selfie" class="preview-box">
                                <input type="file" id="file-selfie" hidden accept="image/*">
                            </div>
                        </div>
                    </div>
                    <button type="submit" id="submit-kyc" class="btn btn-primary" style="width: 100%; margin-top: 40px;">Submit for Verification</button>
                </form>
            </div>
        </div>
    </main>

    <nav class="bottom-nav"></nav>

    <script src="app.js" type="module"></script>
    <script type="module">
        import { auth, db, requireAuth } from './firebase-config.js';
        import { initAppShell, showToast, setLoading } from './components.js';
        import { doc, onSnapshot, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        requireAuth(user => {
            initAppShell('profile');
            let img1 = "", img2 = "";

            onSnapshot(doc(db, "users", user.uid), snap => {
                const u = snap.data();
                const area = document.getElementById('kyc-status-area');
                const form = document.getElementById('kyc-form-card');

                if (u.kycStatus === 'verified') {
                    area.innerHTML = `<div class="card" style="border-color:var(--green); text-align:center;"><i class="fa-solid fa-circle-check" style="color:var(--green); font-size:40px; margin-bottom:15px;"></i><h3>Verified Account</h3><p>Your identity is confirmed. Enjoy full vault access.</p></div>`;
                    form.style.display = 'none';
                } else if (u.kycStatus === 'pending') {
                    area.innerHTML = `<div class="card" style="border-color:var(--orange); text-align:center;"><i class="fa-solid fa-clock" style="color:var(--orange); font-size:40px; margin-bottom:15px;"></i><h3>Under Review</h3><p>Compliance team is verifying your documents. (2-6 hours).</p></div>`;
                    form.style.display = 'none';
                } else {
                    form.style.display = 'block';
                    if(u.kycStatus === 'rejected') area.innerHTML = `<div class="card" style="border-color:var(--red); background:rgba(239,68,68,0.1);"><h4 style="color:var(--red);">Verification Rejected</h4><p style="font-size:13px;">Please upload clearer documents. Ensure all text is readable.</p></div>`;
                }
            });

            const bindFile = (id, pid, cb) => {
                document.getElementById(id).onchange = (e) => {
                    const reader = new FileReader();
                    reader.onload = () => { document.getElementById(pid).src = reader.result; document.getElementById(pid).style.display = 'block'; cb(reader.result); };
                    reader.readAsDataURL(e.target.files[0]);
                };
            };
            bindFile('file-front', 'p-front', (r) => img1 = r);
            bindFile('file-selfie', 'p-selfie', (r) => img2 = r);

            document.getElementById('kyc-form').onsubmit = async (e) => {
                e.preventDefault();
                if(!img1 || !img2) return showToast("Upload both photos", "warning");
                setLoading(document.getElementById('submit-kyc'), true);
                try {
                    await setDoc(doc(db, "kyc", user.uid), { uid: user.uid, type: document.getElementById('k-type').value, num: document.getElementById('k-num').value, imgFront: img1, imgSelfie: img2, status: "pending", createdAt: serverTimestamp() });
                    await setDoc(doc(db, "users", user.uid), { kycStatus: "pending" }, { merge: true });
                    showToast("KYC Submitted", "success");
                } catch (e) { showToast(e.message, "error"); }
                setLoading(document.getElementById('submit-kyc'), false);
            };
        });
    </script>
</body>
</html>
