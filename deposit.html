<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Fund Wallet | BluePay</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<body data-page="deposit">
    <div id="global-loader"><div class="spinner"></div></div>
    <aside class="sidebar"></aside>
    <header class="mobile-header"></header>

    <main class="main-content">
        <div class="reveal" style="margin-bottom: 40px;"><h1>Fund Wallet</h1><p>Securely add funds via Paystack gateway.</p></div>

        <div class="grid" style="grid-template-columns: 1.5fr 1fr; gap: 30px; align-items: start;">
            <div class="card reveal">
                <div class="auth-input-group" style="margin-bottom: 30px;">
                    <label>Amount to Deposit (₦)</label>
                    <input type="number" id="dep-amt" placeholder="10,000" style="font-size: 24px; font-weight: 800; padding: 20px;">
                </div>
                <div class="grid-2 action-grid" style="gap: 10px; margin-bottom: 40px; grid-template-columns: repeat(4, 1fr);">
                    <button class="btn btn-outline" style="min-height: 44px; font-size: 12px; padding: 0;" onclick="setAmt(5000)">₦5k</button>
                    <button class="btn btn-outline" style="min-height: 44px; font-size: 12px; padding: 0;" onclick="setAmt(20000)">₦20k</button>
                    <button class="btn btn-outline" style="min-height: 44px; font-size: 12px; padding: 0;" onclick="setAmt(100000)">₦100k</button>
                    <button class="btn btn-outline" style="min-height: 44px; font-size: 12px; padding: 0;" onclick="setAmt(500000)">₦500k</button>
                </div>
                <button id="pay-btn" class="btn btn-primary" style="width: 100%; padding: 20px; font-size: 18px;"><i class="fa-solid fa-shield-check"></i> Secure Checkout</button>
                <div class="flex-center" style="margin-top: 30px; opacity: 0.5;"><img src="https://paystack.com/assets/img/login/paystack-logo.png" height="15"></div>
            </div>
            <div class="card reveal" style="background: rgba(34,197,94,0.05); border-color: rgba(34,197,94,0.2);">
                <h4>Instructions</h4>
                <ul style="font-size: 13px; list-style: none; margin-top: 15px;" class="grid">
                    <li>1. Enter deposit amount (Min ₦1,000).</li>
                    <li>2. Complete the Paystack checkout.</li>
                    <li>3. Wallet credits instantly upon success.</li>
                </ul>
            </div>
        </div>

        <div class="card reveal" style="margin-top: 40px; padding: 0; overflow: hidden;">
            <div style="padding: 20px 25px; border-bottom: 1px solid var(--border);"><h3>Deposit History</h3></div>
            <div class="table-wrapper"><table style="width: 100%;">
                <thead><tr><th>Date</th><th>Amount</th><th>Ref</th><th>Status</th></tr></thead>
                <tbody id="dep-history-body"></tbody>
            </table></div>
        </div>
    </main>

    <nav class="bottom-nav"></nav>

    <script src="app.js" type="module"></script>
    <script type="module">
        import { auth, db, PAYSTACK_PUBLIC_KEY, requireAuth, updateWallet, fmtN } from './firebase-config.js';
        import { initAppShell, setLoading, showToast } from './components.js';
        import { collection, query, where, orderBy, limit, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        requireAuth(user => {
            initAppShell('deposit');
            window.setAmt = (v) => document.getElementById('dep-amt').value = v;

            document.getElementById('pay-btn').onclick = function() {
                const amt = parseFloat(document.getElementById('dep-amt').value);
                if (!amt || amt < 1000) return showToast("Min deposit is ₦1,000", "warning");

                setLoading(this, true, "Opening Gateway...");
                const handler = PaystackPop.setup({
                    key: PAYSTACK_PUBLIC_KEY,
                    email: user.email,
                    amount: amt * 100,
                    currency: 'NGN',
                    callback: async (res) => {
                        await addDoc(collection(db, "deposits"), { uid: user.uid, amount: amt, reference: res.reference, status: "completed", createdAt: serverTimestamp() });
                        await updateWallet(user.uid, amt, 'credit', { type: 'deposit', description: "Wallet Funding via Paystack", status: 'completed' });
                        showToast("Deposit Successful!", "success");
                        setTimeout(() => window.location.href = 'dashboard.html', 1500);
                    },
                    onClose: () => { setLoading(this, false, "Secure Checkout"); showToast("Payment Cancelled", "info"); }
                });
                handler.openIframe();
            };

            const q = query(collection(db, "deposits"), where("uid", "==", user.uid), orderBy("createdAt", "desc"), limit(10));
            onSnapshot(q, snap => {
                document.getElementById('dep-history-body').innerHTML = snap.docs.map(d => {
                    const x = d.data();
                    return `<tr><td>${x.createdAt ? x.createdAt.toDate().toLocaleDateString() : '...'}</td><td style="font-weight:800">${fmtN(x.amount)}</td><td style="font-family:monospace; font-size:11px;">${x.reference.substring(0,10)}...</td><td><span class="badge badge-success">PAID</span></td></tr>`;
                }).join('');
            });
        });
    </script>
</body>
</html>
