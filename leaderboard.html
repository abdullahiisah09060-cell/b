<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard — BluePay</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="dashboard">
    <div id="global-loader"><div class="spinner"></div></div>
    <aside class="sidebar"></aside>
    <header class="mobile-header"></header>

    <main class="main-content">
        <div class="reveal" style="margin-bottom: 40px;">
            <h1>Top Investors</h1>
            <p style="color: var(--muted2);">Recognizing the highest earners in the BluePay community.</p>
        </div>

        <div class="card reveal" style="padding: 0; overflow: hidden;">
            <div class="table-container">
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="background: var(--bg3); text-align: left;">
                            <th style="padding: 20px;">RANK</th>
                            <th style="padding: 20px;">INVESTOR</th>
                            <th style="padding: 20px;">TOTAL EARNED</th>
                            <th style="padding: 20px;">STATUS</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        <!-- Data injected -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <nav class="bottom-nav"></nav>
    <script src="app.js" type="module"></script>
    <script type="module">
        import { db, fmtN } from './firebase-config.js';
        import { collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const snap = await getDocs(query(collection(db, "users"), orderBy("totalEarned", "desc"), limit(10)));
        document.getElementById('leaderboard-body').innerHTML = snap.docs.map((doc, i) => {
            const u = doc.data();
            return `
                <tr style="border-bottom: 1px solid var(--border);">
                    <td style="padding: 20px; font-weight: 900; font-size: 20px; color: ${i < 3 ? 'var(--gold)' : 'var(--muted)'}">#${i+1}</td>
                    <td style="padding: 20px;"><b>${u.displayName.split(' ')[0]} ${u.displayName.split(' ')[1]?.[0] || ''}.</b></td>
                    <td style="padding: 20px; font-weight: 800; color: var(--green);">${fmtN(u.totalEarned)}</td>
                    <td style="padding: 20px;"><span class="badge badge-success">Active</span></td>
                </tr>
            `;
        }).join('');
    </script>
</body>
</html>
