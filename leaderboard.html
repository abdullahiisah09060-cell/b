<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Top Investors | BluePay</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .rank-card { display: flex; align-items: center; gap: 20px; padding: 15px 25px; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; }
        .rank-1 { border-color: var(--gold); background: linear-gradient(135deg, var(--bg2), #1a1505); }
        .rank-num { font-size: 24px; font-weight: 900; width: 40px; color: var(--muted); }
        .rank-1 .rank-num { color: var(--gold); }
    </style>
</head>
<body data-page="public">
    <div id="global-loader"><div class="spinner"></div></div>
    <header class="mobile-header" style="display: flex;"></header>
    <main class="container" style="padding: 120px 20px 80px;">
        <div class="reveal" style="text-align: center; margin-bottom: 60px;">
            <h1 style="font-size: 48px;">Community <span class="gold-text">Elite</span></h1>
            <p>Our most committed investors building wealth together.</p>
        </div>
        <div id="l-list" style="max-width: 600px; margin: 0 auto;"></div>
    </main>
    <script src="app.js" type="module"></script>
    <script type="module">
        import { db, fmtN } from './firebase-config.js';
        import { collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        onSnapshot(query(collection(db, "users"), orderBy("totalInvested", "desc"), limit(20)), snap => {
            document.getElementById('l-list').innerHTML = snap.docs.map((d, i) => {
                const u = d.data();
                return `<div class="rank-card rank-${i+1} reveal"><div class="rank-num">#${i+1}</div><div style="flex:1;"><h4>${u.displayName.split(' ')[0]} ${u.displayName.split(' ')[1]?.[0] || ''}.</h4><p style="font-size:12px;">Active Member</p></div><div style="text-align:right;"><p class="text-micro">INVESTED</p><b class="gold-text">${fmtN(u.totalInvested)}</b></div></div>`;
            }).join('');
        });
    </script>
</body>
</html>
