<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard — BluePay</title>
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    nav { position: fixed; top: 0; width: 100%; z-index: 1000; padding: 25px 0; background: rgba(6, 8, 15, 0.95); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); }
    .hero-sec { padding: 160px 0 60px; text-align: center; }
    
    .tabs { display: flex; justify-content: center; gap: 20px; margin-bottom: 50px; }
    .tab-btn { background: var(--bg2); border: 1px solid var(--border); color: var(--muted2); padding: 12px 30px; border-radius: 50px; cursor: pointer; font-weight: 700; transition: 0.3s; }
    .tab-btn.active { background: var(--blue); color: white; border-color: var(--blue2); }

    .rank-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 18px; padding: 20px 30px; display: flex; align-items: center; margin-bottom: 15px; transition: 0.3s; }
    .rank-card:hover { border-color: var(--blue2); transform: scale(1.02); }
    .rank-num { font-size: 24px; font-weight: 900; width: 50px; color: var(--muted); }
    .rank-1 .rank-num { color: var(--gold); }
    .rank-2 .rank-num { color: #C0C0C0; }
    .rank-3 .rank-num { color: #CD7F32; }
    
    .user-avatar { width: 50px; height: 50px; border-radius: 50%; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; margin-right: 20px; overflow: hidden; border: 2px solid var(--border); }
    .user-info { flex: 1; }
    .user-val { font-weight: 800; font-size: 18px; color: var(--text); }

    .my-rank-footer { position: fixed; bottom: 0; width: 100%; background: var(--bg3); border-top: 2px solid var(--blue2); padding: 20px 0; z-index: 100; display: none; }
  </style>
</head>
<body data-page="leaderboard">
  <div id="global-loader"><div class="spinner"></div></div>

  <nav>
    <div class="container flex" style="justify-content: space-between; align-items: center;">
      <a href="index.html" class="flex" style="gap: 12px;">
        <div style="width: 38px; height: 38px; background: var(--blue); border-radius: 10px; display: flex; align-items: center; justify-content: center;"><i class="fa-solid fa-b" style="color: white;"></i></div>
        <span style="font-size: 22px; font-weight: 900;">BluePay</span>
      </a>
      <div class="flex" style="gap: 15px;">
        <a href="login.html" class="btn btn-outline" style="padding: 10px 20px;">Dashboard</a>
      </div>
    </div>
  </nav>

  <section class="hero-sec container">
    <h1 style="font-size: 48px; margin-bottom: 15px;">Top Performers</h1>
    <p style="color: var(--muted2); font-size: 18px;">Recognizing our most successful investors and community builders.</p>
  </section>

  <div class="container" style="padding-bottom: 120px;">
    <div class="tabs reveal">
      <button class="tab-btn active" id="btn-investors">Top Investors</button>
      <button class="tab-btn" id="btn-referrers">Top Affiliates</button>
    </div>

    <div id="leaderboard-list" class="reveal">
      <!-- Ranks injected here -->
      <div class="skeleton" style="height: 80px; border-radius: 18px; margin-bottom: 15px;"></div>
      <div class="skeleton" style="height: 80px; border-radius: 18px; margin-bottom: 15px;"></div>
      <div class="skeleton" style="height: 80px; border-radius: 18px;"></div>
    </div>
  </div>

  <div id="my-rank-bar" class="my-rank-footer">
    <div class="container flex-between">
      <div class="flex" style="gap: 20px;">
        <div id="my-avatar" class="user-avatar" style="background: var(--blue);">?</div>
        <div>
          <p style="font-size: 11px; font-weight: 700; color: var(--muted2);">YOUR CURRENT RANK</p>
          <h4 id="my-name">...</h4>
        </div>
      </div>
      <div style="text-align: right;">
        <h2 id="my-rank-val" style="color: var(--blue2);">#--</h2>
      </div>
    </div>
  </div>

  <script src="app.js" type="module"></script>
  <script type="module">
    import { db, fmtN, auth } from './firebase-config.js';
    import { collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    let currentMode = 'investors'; // or 'referrers'

    async function loadLeaderboard() {
      const list = document.getElementById('leaderboard-list');
      const sortField = currentMode === 'investors' ? 'totalInvested' : 'referralCount';
      
      const q = query(collection(db, "users"), orderBy(sortField, "desc"), limit(10));
      const snap = await getDocs(q);
      
      list.innerHTML = snap.docs.map((doc, i) => {
        const u = doc.data();
        const val = currentMode === 'investors' ? fmtN(u.totalInvested) : `${u.referralCount} Referrals`;
        const initial = u.displayName.split(' ').map(n => n[0]).join('');
        
        return `
          <div class="rank-card rank-${i+1} reveal">
            <div class="rank-num">#${i+1}</div>
            <div class="user-avatar">${u.photoBase64 ? `<img src="${u.photoBase64}" style="width:100%;height:100%;object-fit:cover;">` : initial}</div>
            <div class="user-info">
              <h4 style="font-size: 17px;">${u.displayName.split(' ')[0]} ${u.displayName.split(' ')[1]?.[0] || ''}.</h4>
              <p style="font-size: 12px; color: var(--muted2);">${u.kycStatus === 'verified' ? '<i class="fa-solid fa-circle-check" style="color:var(--blue2)"></i> Verified' : 'Investor'}</p>
            </div>
            <div class="user-val">${val}</div>
          </div>
        `;
      }).join('');
    }

    document.getElementById('btn-investors').onclick = (e) => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      currentMode = 'investors';
      loadLeaderboard();
    };

    document.getElementById('btn-referrers').onclick = (e) => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      currentMode = 'referrers';
      loadLeaderboard();
    };

    loadLeaderboard();
    setTimeout(() => { document.getElementById('global-loader').style.display = 'none'; }, 800);
  </script>
</body>
</html>
