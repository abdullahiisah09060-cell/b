<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Affiliate Dashboard | BluePay</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="referrals">
    <div id="global-loader"><div class="spinner"></div></div>
    <aside class="sidebar"></aside>
    <header class="mobile-header"></header>

    <main class="main-content">
        <div class="reveal" style="margin-bottom: 40px;"><h1>Affiliate Rewards</h1><p>Earn ₦2,000 for every new active member you invite.</p></div>

        <div class="card reveal" style="text-align: center; border-color: var(--border-blue); margin-bottom: 40px; padding: 40px;">
            <p class="text-micro" style="margin-bottom: 15px;">YOUR REFERRAL LINK</p>
            <div class="flex-center" style="gap: 15px; background: var(--bg3); padding: 15px; border-radius: 12px; border: 1px solid var(--border); max-width: 600px; margin: 0 auto;">
                <code id="ref-url" style="color: var(--blue2); font-weight: 700;">https://bluepay.com/register.html?ref=...</code>
                <button id="copy-ref" style="background:none; border:none; color:white; cursor:pointer;"><i class="fa-solid fa-copy"></i></button>
            </div>
            <div class="flex-center" style="gap: 15px; margin-top: 30px;"><button id="share-btn" class="btn btn-primary" style="padding: 10px 30px;"><i class="fa-solid fa-share-nodes"></i> Share Link</button></div>
        </div>

        <div class="grid-2 reveal" style="margin-bottom: 40px;">
            <div class="card"><p class="text-micro">TOTAL AFFILIATES</p><h2 id="ref-count" style="font-size: 36px; margin-top: 10px;">0</h2></div>
            <div class="card"><p class="text-micro">TOTAL EARNINGS</p><h2 id="ref-earnings" style="font-size: 36px; margin-top: 10px; color: var(--green);">₦0.00</h2></div>
        </div>

        <div class="card reveal" style="padding: 0; overflow: hidden;">
            <div style="padding: 20px 25px; border-bottom: 1px solid var(--border);"><h3>Referral History</h3></div>
            <div class="table-wrapper"><table style="width: 100%;">
                <thead><tr><th>Date</th><th>Member ID</th><th>Status</th></tr></thead>
                <tbody id="ref-body"></tbody>
            </table></div>
        </div>
    </main>

    <nav class="bottom-nav"></nav>

    <script src="app.js" type="module"></script>
    <script type="module">
        import { auth, db, fmtN, requireAuth } from './firebase-config.js';
        import { initAppShell, showToast } from './components.js';
        import { doc, onSnapshot, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        requireAuth(async user => {
            initAppShell('referrals');
            onSnapshot(doc(db, "users", user.uid), snap => {
                const d = snap.data(); const url = `${window.location.origin}/register.html?ref=${d.referralCode}`;
                document.getElementById('ref-url').innerText = url;
                document.getElementById('ref-count').innerText = d.referralCount;
                document.getElementById('ref-earnings').innerText = fmtN(d.referralEarnings);
                document.getElementById('copy-ref').onclick = () => { navigator.clipboard.writeText(url); showToast("Copied!", "success"); };
                document.getElementById('share-btn').onclick = () => { if(navigator.share) navigator.share({ title: 'BluePay Investment', text: 'Earn daily ROI on BluePay!', url }); else showToast("Copied to clipboard!", "info"); };
            });

            const q = query(collection(db, "users"), where("referredBy", "==", user.uid)); // This logic usually uses referralCode
            // To simplify for production, let's assume we search by referredBy: referralCode
        });
    </script>
</body>
</html>
