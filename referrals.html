<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Affiliate Program — BluePay</title>
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .layout-wrapper { display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: var(--bg2); border-right: 1px solid var(--border); padding: 30px 20px; position: fixed; height: 100vh; display: flex; flex-direction: column; z-index: 100; }
    .main-content { flex: 1; margin-left: 260px; padding: 40px; }
    .nav-item { display: flex; align-items: center; gap: 15px; padding: 14px 18px; border-radius: var(--radius-s); color: var(--muted2); font-weight: 600; margin-bottom: 5px; }
    .nav-item:hover, .nav-item.active { background: var(--bg3); color: var(--blue2); }
    
    .ref-link-box { background: var(--bg2); border: 2px dashed var(--blue2); border-radius: 18px; padding: 30px; text-align: center; }
    .ref-stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin: 40px 0; }
    
    @media (max-width: 992px) {
      .sidebar { display: none; }
      .main-content { margin-left: 0; padding: 100px 20px 100px; }
    }
  </style>
</head>
<body data-page="referrals">
  <div id="global-loader"><div class="spinner"></div></div>

  <div class="layout-wrapper">
    <aside class="sidebar">
      <div class="flex" style="gap: 12px; margin-bottom: 40px; padding-left: 10px;">
        <div style="width: 35px; height: 35px; background: var(--blue); border-radius: 8px; display: flex; align-items: center; justify-content: center;"><i class="fa-solid fa-b" style="color: white;"></i></div>
        <span style="font-size: 22px; font-weight: 900;">BluePay</span>
      </div>
      <nav style="flex: 1;">
        <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-house"></i> Dashboard</a>
        <a href="referrals.html" class="nav-item active"><i class="fa-solid fa-users"></i> Referrals</a>
        <a href="transactions.html" class="nav-item"><i class="fa-solid fa-list-ul"></i> Transactions</a>
        <a href="profile.html" class="nav-item"><i class="fa-solid fa-user-circle"></i> Profile</a>
      </nav>
      <div style="padding-top: 20px; border-top: 1px solid var(--border);">
        <a href="#" data-logout class="nav-item" style="color: var(--red);"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
      </div>
    </aside>

    <main class="main-content">
      <div class="reveal" style="margin-bottom: 40px;">
        <h1 style="font-size: 32px; margin-bottom: 8px;">Affiliate Rewards</h1>
        <p>Invite your network and earn ₦2,000 for every successful referral.</p>
      </div>

      <div class="ref-link-box reveal">
        <h3 style="margin-bottom: 15px;">Your Referral Link</h3>
        <div class="flex" style="gap: 10px; max-width: 600px; margin: 0 auto;">
          <input type="text" id="ref-url" readonly style="flex: 1; background: var(--bg3); border: 1px solid var(--border); padding: 15px; border-radius: 10px; color: var(--muted2); font-size: 14px;">
          <button id="copy-ref-btn" class="btn btn-primary" style="padding: 15px 25px;">Copy Link</button>
        </div>
        <div class="flex" style="justify-content: center; gap: 15px; margin-top: 25px;">
          <button id="share-wa" class="btn btn-outline" style="background: #25D366; color: white; border: none;"><i class="fa-brands fa-whatsapp"></i> WhatsApp</button>
          <button id="share-tw" class="btn btn-outline" style="background: #1DA1F2; color: white; border: none;"><i class="fa-brands fa-x-twitter"></i> Twitter</button>
        </div>
      </div>

      <div class="ref-stats-row reveal">
        <div class="card">
          <p style="font-size: 11px; font-weight: 700; color: var(--muted2); margin-bottom: 5px;">TOTAL EARNINGS</p>
          <h2 id="ref-earnings" style="color: var(--green);">₦0.00</h2>
        </div>
        <div class="card">
          <p style="font-size: 11px; font-weight: 700; color: var(--muted2); margin-bottom: 5px;">TOTAL REFERRALS</p>
          <h2 id="ref-count">0</h2>
        </div>
      </div>

      <div class="card reveal">
        <h3 style="margin-bottom: 20px;">Affiliate History</h3>
        <div style="overflow-x: auto;">
          <table style="width: 100%; border-collapse: collapse;">
            <thead>
              <tr style="text-align: left; border-bottom: 1px solid var(--border);">
                <th style="padding: 15px; color: var(--muted2); font-size: 12px;">DATE</th>
                <th style="padding: 15px; color: var(--muted2); font-size: 12px;">FRIEND ID</th>
                <th style="padding: 15px; color: var(--muted2); font-size: 12px;">BONUS</th>
              </tr>
            </thead>
            <tbody id="ref-table-body">
              <tr><td colspan="3" style="text-align: center; padding: 40px; color: var(--muted2);">No referrals yet.</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js" type="module"></script>
  <script type="module">
    import { auth, listenUser, getReferrals, fmtN, requireAuth, toast } from './firebase-config.js';

    requireAuth(async (user) => {
      listenUser(user.uid, (data) => {
        const url = `${window.location.origin}/register.html?ref=${data.referralCode}`;
        document.getElementById('ref-url').value = url;
        document.getElementById('ref-earnings').innerText = fmtN(data.referralEarnings);
        document.getElementById('ref-count').innerText = data.referralCount;

        // Sharing
        const msg = encodeURIComponent(`Join BluePay with my link and get ₦200,000 welcome bonus! ${url}`);
        document.getElementById('share-wa').onclick = () => window.open(`https://wa.me/?text=${msg}`);
        document.getElementById('share-tw').onclick = () => window.open(`https://twitter.com/intent/tweet?text=${msg}`);
      });

      document.getElementById('copy-ref-btn').onclick = () => {
        const url = document.getElementById('ref-url');
        url.select();
        document.execCommand('copy');
        toast("Referral link copied!", "success");
      };

      const refs = await getReferrals(user.uid);
      const body = document.getElementById('ref-table-body');
      if (refs.length > 0) {
        body.innerHTML = refs.map(r => `
          <tr style="border-bottom: 1px solid var(--border);">
            <td style="padding: 15px;">${r.createdAt.toDate().toLocaleDateString()}</td>
            <td style="padding: 15px; font-family: monospace;">BLP-${r.referredId.substr(0,8)}...</td>
            <td style="padding: 15px; color: var(--green); font-weight: 700;">+${fmtN(r.bonus)}</td>
          </tr>
        `).join('');
      }

      setTimeout(() => { document.getElementById('global-loader').style.display = 'none'; }, 600);
    });
  </script>
</body>
</html>
