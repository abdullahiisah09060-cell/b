<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referral Rewards — BluePay</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="dashboard">
    <div id="global-loader"><div class="spinner"></div></div>
    <aside class="sidebar"></aside>
    <header class="mobile-header"></header>

    <main class="main-content">
        <div class="reveal" style="margin-bottom: 40px;">
            <h1>Affiliate Program</h1>
            <p style="color: var(--muted2);">Earn ₦2,000 for every friend who starts investing.</p>
        </div>

        <div class="card reveal" style="text-align: center; border-color: var(--border-blue); margin-bottom: 30px;">
            <p style="font-size: 12px; font-weight: 800; color: var(--muted2); margin-bottom: 15px;">YOUR REFERRAL LINK</p>
            <div class="flex-center" style="gap: 10px; background: var(--bg3); padding: 15px; border-radius: 12px; border: 1px solid var(--border);">
                <code id="ref-link" style="font-size: 14px; color: var(--blue2);">https://bluepay.com/reg?ref=...</code>
                <button onclick="copyRef()" class="btn btn-outline" style="padding: 10px;"><i class="fa-solid fa-copy"></i></button>
            </div>
            <div class="flex-center" style="gap: 15px; margin-top: 25px;">
                <button class="btn btn-primary" style="background:#25D366; border:none;"><i class="fa-brands fa-whatsapp"></i> WhatsApp</button>
                <button class="btn btn-primary" style="background:#1DA1F2; border:none;"><i class="fa-brands fa-twitter"></i> Twitter</button>
            </div>
        </div>

        <div class="grid-2 reveal">
            <div class="card">
                <p style="font-size: 11px; font-weight: 700; color: var(--muted2);">TOTAL REFERRALS</p>
                <h2 id="ref-count" style="margin-top: 5px;">0</h2>
            </div>
            <div class="card">
                <p style="font-size: 11px; font-weight: 700; color: var(--muted2);">TOTAL COMMISSIONS</p>
                <h2 id="ref-earnings" style="color: var(--green); margin-top: 5px;">₦0.00</h2>
            </div>
        </div>
    </main>

    <nav class="bottom-nav"></nav>
    <script src="app.js" type="module"></script>
    <script type="module">
        import { auth, listenUser, toast, fmtN } from './firebase-config.js';
        listenUser(auth.currentUser?.uid || "", user => {
            document.getElementById('ref-link').innerText = `${window.location.origin}/register.html?ref=${user.referralCode}`;
            document.getElementById('ref-count').innerText = user.referralCount || 0;
            document.getElementById('ref-earnings').innerText = fmtN(user.referralEarnings || 0);
        });
        window.copyRef = () => {
            navigator.clipboard.writeText(document.getElementById('ref-link').innerText);
            toast("Link copied!", "success");
        };
    </script>
</body>
</html>
