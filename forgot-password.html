<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — BluePay</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="login">
    <div id="global-loader"><div class="spinner"></div></div>
    <div class="flex-center" style="min-height: 100vh; padding: 20px;">
        <div class="card reveal" style="width: 100%; max-width: 420px; text-align: center;">
            <div style="width: 60px; height: 60px; background: rgba(168,85,247,0.1); color: var(--purple); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px;">
                <i class="fa-solid fa-lock-open" style="font-size: 24px;"></i>
            </div>
            <h2 style="margin-bottom: 10px;">Recover Password</h2>
            <p style="color: var(--muted2); margin-bottom: 30px;">Enter your email to receive a recovery link.</p>

            <form id="forgot-form">
                <div class="auth-input-group">
                    <label>Email Address</label>
                    <input type="email" id="forgot-email" placeholder="investor@example.com" required>
                </div>
                <button type="submit" id="forgot-btn" class="btn btn-primary" style="width: 100%;">Send Recovery Link</button>
            </form>

            <a href="login.html" style="display: block; margin-top: 25px; font-weight: 700; color: var(--blue2); font-size: 14px;"><i class="fa-solid fa-arrow-left"></i> Back to Login</a>
        </div>
    </div>
    <script src="app.js" type="module"></script>
    <script type="module">
        import { auth, toast } from './firebase-config.js';
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { toggleLoader } from './components.js';

        document.getElementById('forgot-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('forgot-btn');
            const email = document.getElementById('forgot-email').value;
            toggleLoader(true, btn);
            try {
                await sendPasswordResetEmail(auth, email);
                toast("Recovery email sent!", "success");
            } catch (err) { toast(err.message, "error"); }
            toggleLoader(false, btn);
        };
    </script>
</body>
</html>
