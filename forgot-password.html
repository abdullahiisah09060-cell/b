<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recover Password | BluePay</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="flex-center" style="min-height: 100vh; padding: 20px;">
    <div class="card reveal" style="width: 100%; max-width: 420px; text-align: center; padding: 40px;">
        <div id="form-container">
            <div style="width: 60px; height: 60px; background: rgba(168,85,247,0.1); color: var(--purple); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px;">
                <i class="fa-solid fa-lock-open" style="font-size: 24px;"></i>
            </div>
            <h2 style="margin-bottom: 12px;">Forgot Password?</h2>
            <p style="margin-bottom: 30px;">No worries! Enter your account email and we'll send you a link to reset it.</p>

            <form id="forgot-form">
                <div class="auth-input-group">
                    <label>Account Email</label>
                    <input type="email" id="reset-email" placeholder="name@example.com" required>
                </div>
                <button type="submit" id="submit-btn" class="btn btn-primary" style="width: 100%;">Send Reset Link</button>
            </form>
        </div>

        <div id="success-state" style="display: none;">
            <div style="font-size: 50px; color: var(--green); margin-bottom: 25px;"><i class="fa-solid fa-paper-plane"></i></div>
            <h2>Email Sent</h2>
            <p style="margin-bottom: 30px;">If an account exists for that email, a reset link will arrive in your inbox shortly.</p>
            <a href="login.html" class="btn btn-outline" style="width: 100%;">Back to Login</a>
        </div>

        <a href="login.html" style="display: block; margin-top: 30px; font-weight: 700; color: var(--blue2); font-size: 14px;"><i class="fa-solid fa-arrow-left"></i> Return to Sign In</a>
    </div>

    <script src="app.js" type="module"></script>
    <script type="module">
        import { auth } from './firebase-config.js';
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { toggleLoader, showToast } from './components.js';

        document.getElementById('forgot-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const email = document.getElementById('reset-email').value.trim();

            toggleLoader(btn, true, "Send Reset Link");
            try {
                await sendPasswordResetEmail(auth, email);
                document.getElementById('form-container').style.display = 'none';
                document.getElementById('success-state').style.display = 'block';
            } catch (err) {
                showToast("Error processing request. Check email spelling.", "error");
                toggleLoader(btn, false, "Send Reset Link");
            }
        };
    </script>
</body>
</html>
