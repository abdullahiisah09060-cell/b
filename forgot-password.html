<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — BluePay</title>
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="forgot">
  <div id="global-loader"><div class="spinner"></div></div>
  <div class="auth-page" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div class="card reveal" style="width: 100%; max-width: 440px;">
      <div style="text-align: center; margin-bottom: 40px;">
        <div style="width: 70px; height: 70px; background: rgba(168,85,247,0.1); color: var(--purple); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px;">
          <i class="fa-solid fa-key" style="font-size: 30px;"></i>
        </div>
        <h2 style="font-size: 28px; margin-bottom: 10px;">Reset Password</h2>
        <p>Instructions will be dispatched to your email</p>
      </div>

      <form id="forgot-form">
        <div class="auth-input-group">
          <label>Email Address</label>
          <input type="email" id="forgot-email" placeholder="john@example.com" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 25px;">Send Reset Link</button>
      </form>

      <p style="text-align: center; font-size: 14px;"><a href="login.html" style="color: var(--blue2); font-weight: 800;"><i class="fa-solid fa-arrow-left" style="margin-right: 8px;"></i> Back to Login</a></p>
    </div>
  </div>
  <script src="auth.js" type="module"></script>
  <script type="module">
    window.onload = () => { document.getElementById('global-loader').style.display = 'none'; };
  </script>
</body>
</html>
