<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account — BluePay</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="profile">
    <div id="global-loader"><div class="spinner"></div></div>
    <aside class="sidebar"></aside>
    <header class="mobile-header"></header>

    <main class="main-content">
        <div class="reveal" style="margin-bottom: 40px;">
            <h1>Profile Settings</h1>
            <p style="color: var(--muted2);">Update your personal information and security preferences.</p>
        </div>

        <div class="grid" style="grid-template-columns: 1fr 1.5fr; gap: 30px; align-items: start;">
            <!-- Profile Card -->
            <div class="card reveal" style="text-align: center;">
                <div id="avatar-circle" style="width: 100px; height: 100px; border-radius: 50%; background: var(--blue); color: white; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 800; margin: 0 auto 20px;">JD</div>
                <h3 id="prof-name">Investor</h3>
                <p id="prof-email" style="font-size: 14px; color: var(--muted2); margin-bottom: 20px;">email@example.com</p>
                <div id="prof-kyc-badge"></div>
            </div>

            <!-- Edit Form -->
            <div class="card reveal">
                <form id="profile-edit-form">
                    <div class="auth-input-group">
                        <label>Full Name</label>
                        <input type="text" id="edit-name" required>
                    </div>
                    <div class="auth-input-group">
                        <label>Phone Number</label>
                        <input type="tel" id="edit-phone" required>
                    </div>
                    <button type="submit" id="save-btn" class="btn btn-primary" style="width: 100%;">Update Information</button>
                </form>

                <div style="margin-top: 40px; padding-top: 40px; border-top: 1px solid var(--border);">
                    <h3 style="margin-bottom: 20px;">Security</h3>
                    <button onclick="resetPassword()" class="btn btn-outline" style="width: 100%; border-color: var(--orange); color: var(--orange);">Request Password Reset Email</button>
                </div>
            </div>
        </div>
    </main>

    <nav class="bottom-nav"></nav>

    <script src="app.js" type="module"></script>
    <script type="module">
        import { auth, db, listenUser, toast } from './firebase-config.js';
        import { updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { toggleLoader } from './components.js';

        listenUser(auth.currentUser?.uid || "", (user) => {
            document.getElementById('prof-name').innerText = user.displayName;
            document.getElementById('prof-email').innerText = user.email;
            document.getElementById('edit-name').value = user.displayName;
            document.getElementById('edit-phone').value = user.phone || "";
            document.getElementById('avatar-circle').innerText = user.displayName.split(' ').map(n => n[0]).join('');
            
            const kyc = document.getElementById('prof-kyc-badge');
            if(user.kycStatus === 'verified') kyc.innerHTML = '<span class="badge badge-success"><i class="fa-solid fa-check-circle"></i> VERIFIED</span>';
            else kyc.innerHTML = '<span class="badge badge-warning">UNVERIFIED</span>';
        });

        document.getElementById('profile-edit-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('save-btn');
            toggleLoader(true, btn);
            try {
                await updateDoc(doc(db, "users", auth.currentUser.uid), {
                    displayName: document.getElementById('edit-name').value,
                    phone: document.getElementById('edit-phone').value
                });
                toast("Profile updated!", "success");
            } catch (err) {
                toast(err.message, "error");
            } finally {
                toggleLoader(false, btn);
            }
        };

        window.resetPassword = () => {
            sendPasswordResetEmail(auth, auth.currentUser.email).then(() => {
                toast("Reset link sent to your email", "success");
            });
        };
    </script>
</body>
</html>
