<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* Reuse Sidebar Layout */
    .layout-wrapper { display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: var(--bg2); border-right: 1px solid var(--border); padding: 30px 20px; position: fixed; height: 100vh; display: flex; flex-direction: column; z-index: 100; }
    .main-content { flex: 1; margin-left: 260px; padding: 40px; }
    .nav-item { display: flex; align-items: center; gap: 15px; padding: 14px 18px; border-radius: var(--radius-s); color: var(--muted2); font-weight: 600; margin-bottom: 5px; }
    .nav-item:hover, .nav-item.active { background: var(--bg3); color: var(--blue2); }
    .mobile-header { display: none; position: fixed; top: 0; width: 100%; background: var(--bg2); padding: 15px 20px; border-bottom: 1px solid var(--border); z-index: 1000; justify-content: space-between; }
    .bottom-nav { display: none; position: fixed; bottom: 0; width: 100%; background: var(--bg2); border-top: 1px solid var(--border); padding: 12px 0; z-index: 1000; justify-content: space-around; }
    .b-nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--muted2); font-size: 10px; font-weight: 700; }

    /* Profile Specific UI */
    .profile-header { display: flex; align-items: center; gap: 30px; margin-bottom: 40px; flex-wrap: wrap; }
    .avatar-wrapper { position: relative; width: 120px; height: 120px; }
    .avatar-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid var(--bg3); background: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 800; color: white; overflow: hidden; }
    .edit-avatar-btn { position: absolute; bottom: 5px; right: 5px; width: 35px; height: 35px; background: var(--blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 3px solid var(--bg2); }

    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
    .section-title { font-size: 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

    @media (max-width: 992px) {
      .sidebar { display: none; }
      .main-content { margin-left: 0; padding: 100px 20px 100px; }
      .mobile-header, .bottom-nav { display: flex; }
      .settings-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
