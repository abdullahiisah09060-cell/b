<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Live Chat | BluePay</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .c-box { height: calc(100vh - 350px); display: flex; flex-direction: column; background: var(--bg2); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
        .c-msgs { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 12px; }
        .m { max-width: 80%; padding: 12px 16px; border-radius: 14px; font-size: 14px; }
        .m-u { align-self: flex-end; background: var(--blue); color: white; border-bottom-right-radius: 2px; }
        .m-a { align-self: flex-start; background: var(--bg3); border: 1px solid var(--border); border-bottom-left-radius: 2px; }
    </style>
</head>
<body data-page="support">
    <div id="global-loader"><div class="spinner"></div></div>
    <aside class="sidebar"></aside>
    <header class="mobile-header"></header>
    <main class="main-content">
        <h1>Help Center</h1><p style="margin-bottom: 25px;">Assigned Agent: <b id="a-name">...</b></p>
        <div class="c-box"><div class="c-msgs" id="c-msgs"></div>
            <div style="padding: 20px; background: var(--bg3); border-top: 1px solid var(--border);">
                <form id="c-form" class="flex" style="gap: 10px;">
                    <input type="text" id="c-in" placeholder="Type message..." style="flex:1; background:var(--bg); border:1px solid var(--border); padding:12px; border-radius:10px; color:white;">
                    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-paper-plane"></i></button>
                </form>
            </div>
        </div>
    </main>
    <nav class="bottom-nav"></nav>
    <script src="app.js" type="module"></script>
    <script type="module">
        import { auth, db, requireAuth } from './firebase-config.js';
        import { initAppShell } from './components.js';
        import { collection, query, orderBy, onSnapshot, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        requireAuth(async user => {
            initAppShell('support');
            const uD = (await getDoc(doc(db, "users", user.uid))).data();
            document.getElementById('a-name').innerText = uD.agentName || "Sarah Mitchell";
            onSnapshot(query(collection(db, "support", user.uid, "messages"), orderBy("createdAt", "asc")), snap => {
                const box = document.getElementById('c-msgs');
                box.innerHTML = snap.docs.map(d => `<div class="m ${d.data().isAdmin ? 'm-a' : 'm-u'}">${d.data().text}</div>`).join('');
                box.scrollTop = box.scrollHeight;
            });
            document.getElementById('c-form').onsubmit = async (e) => {
                e.preventDefault(); const inEl = document.getElementById('c-in'); if(!inEl.value.trim()) return;
                await addDoc(collection(db, "support", user.uid, "messages"), { text: inEl.value, isAdmin: false, createdAt: serverTimestamp() });
                inEl.value = "";
            };
        });
    </script>
</body>
</html>
