<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Chat — BluePay</title>
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .layout-wrapper { display: flex; height: 100vh; overflow: hidden; }
    .sidebar { width: 260px; background: var(--bg2); border-right: 1px solid var(--border); padding: 30px 20px; display: flex; flex-direction: column; }
    .main-content { flex: 1; display: flex; flex-direction: column; background: var(--bg); }

    /* Chat UI */
    .chat-header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 15px 30px; display: flex; align-items: center; justify-content: space-between; }
    .agent-info { display: flex; align-items: center; gap: 15px; }
    .agent-avatar { width: 45px; height: 45px; border-radius: 50%; background: var(--blue); color: white; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; position: relative; }
    .online-dot { position: absolute; bottom: 2px; right: 2px; width: 10px; height: 10px; background: var(--green); border-radius: 50%; border: 2px solid var(--bg2); }

    .chat-messages { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
    .msg-bubble { max-width: 75%; padding: 14px 20px; border-radius: 18px; font-size: 15px; position: relative; line-height: 1.5; }
    .msg-user { align-self: flex-end; background: var(--blue); color: white; border-bottom-right-radius: 4px; }
    .msg-agent { align-self: flex-start; background: var(--bg2); color: var(--text); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
    .msg-time { font-size: 10px; margin-top: 8px; opacity: 0.6; display: block; text-align: right; }

    .chat-input-area { background: var(--bg2); border-top: 1px solid var(--border); padding: 20px 30px; }
    .input-wrapper { background: var(--bg3); border: 1px solid var(--border); border-radius: 30px; padding: 10px 20px; display: flex; align-items: center; gap: 15px; }
    .chat-input { flex: 1; background: transparent; border: none; color: var(--text); padding: 10px 0; font-size: 15px; }
    .chat-input:focus { outline: none; }
    .send-btn { background: var(--blue); color: white; width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .quick-replies { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
    .reply-chip { background: var(--bg3); border: 1px solid var(--border); padding: 8px 16px; border-radius: 50px; font-size: 12px; font-weight: 700; white-space: nowrap; cursor: pointer; transition: 0.2s; }
    .reply-chip:hover { border-color: var(--blue2); background: var(--bg4); }

    @media (max-width: 992px) {
      .sidebar { display: none; }
      .chat-header { padding: 15px 20px; }
      .chat-messages { padding: 20px; }
      .chat-input-area { padding: 15px 20px 100px; }
    }
  </style>
</head>
<body data-page="support">
  <div id="global-loader"><div class="spinner"></div></div>

  <div class="layout-wrapper">
    <aside class="sidebar">
       <!-- Reusing sidebar items for brevity -->
       <div class="flex" style="gap: 12px; margin-bottom: 40px;">
        <div style="width: 35px; height: 35px; background: var(--blue); border-radius: 8px; display: flex; align-items: center; justify-content: center;"><i class="fa-solid fa-b" style="color: white;"></i></div>
        <span style="font-size: 22px; font-weight: 900;">BluePay</span>
      </div>
      <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-house"></i> Dashboard</a>
      <a href="support.html" class="nav-item active"><i class="fa-solid fa-headset"></i> Support</a>
      <a href="profile.html" class="nav-item"><i class="fa-solid fa-user-circle"></i> Profile</a>
      <div style="margin-top: auto;">
        <a href="index.html" class="nav-item"><i class="fa-solid fa-arrow-left"></i> Home</a>
      </div>
    </aside>

    <main class="main-content">
      <header class="chat-header">
        <div class="agent-info">
          <div id="agent-icon" class="agent-avatar">BP<div class="online-dot"></div></div>
          <div>
            <h4 id="agent-name-head" style="font-size: 16px;">Support Agent</h4>
            <p style="font-size: 12px; color: var(--green); font-weight: 700;">Active Now</p>
          </div>
        </div>
        <a href="dashboard.html" class="btn btn-outline" style="padding: 10px 15px; border-radius: 50px; font-size: 12px;"><i class="fa-solid fa-xmark"></i></a>
      </header>

      <div class="chat-messages" id="chat-box">
        <!-- Messages loaded here -->
        <div style="text-align: center; color: var(--muted); font-size: 12px; margin: 20px 0;">Messages are end-to-end encrypted</div>
      </div>

      <div class="chat-input-area">
        <div class="quick-replies" id="quick-replies">
          <div class="reply-chip" onclick="quickSend('How do I withdraw?')">Withdrawal help</div>
          <div class="reply-chip" onclick="quickSend('Is my bonus active?')">Bonus status</div>
          <div class="reply-chip" onclick="quickSend('Plan recommendations')">Investment help</div>
          <div class="reply-chip" onclick="quickSend('Change my bank details')">Account update</div>
        </div>
        <div class="input-wrapper">
          <input type="text" id="msg-input" class="chat-input" placeholder="Type your message here...">
          <button id="send-msg-btn" class="send-btn" disabled><i class="fa-solid fa-paper-plane"></i></button>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js" type="module"></script>
  <script type="module">
    import { auth, listenUser, getOrCreateThread, sendMsg, listenMessages, requireAuth, toast } from './firebase-config.js';

    requireAuth(async (user) => {
      let activeAgent = "Support Agent";
      const chatBox = document.getElementById('chat-box');
      const msgInput = document.getElementById('msg-input');
      const sendBtn = document.getElementById('send-msg-btn');

      // 1. Get User Data for Agent Assignment
      listenUser(user.uid, async (data) => {
        activeAgent = data.agentName || "Sarah Mitchell";
        document.getElementById('agent-name-head').innerText = activeAgent;
        document.getElementById('agent-icon').innerText = activeAgent.split(' ').map(n => n[0]).join('');

        // 2. Initialize / Get Chat Thread
        const threadId = await getOrCreateThread(user.uid, user.email, user.displayName, activeAgent);

        // 3. Listen for Messages
        listenMessages(threadId, (messages) => {
          chatBox.innerHTML = messages.map(m => {
            const isMe = m.senderUid === user.uid;
            const time = m.createdAt ? m.createdAt.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '...';
            return `
              <div class="msg-bubble ${isMe ? 'msg-user' : 'msg-agent'}">
                ${m.message}
                <span class="msg-time">${time}</span>
              </div>
            `;
          }).join('');
          chatBox.scrollTop = chatBox.scrollHeight;
        });

        // 4. Send Message Handler
        const handleSend = async (text) => {
          if (!text.trim()) return;
          msgInput.value = '';
          sendBtn.disabled = true;
          try {
            await sendMsg(threadId, user.uid, user.displayName, text, false);
          } catch (err) {
            toast("Failed to send message", "error");
          }
        };

        sendBtn.onclick = () => handleSend(msgInput.value);
        msgInput.onkeypress = (e) => { if(e.key === 'Enter') handleSend(msgInput.value); };
        
        window.quickSend = (text) => handleSend(text);
      });

      msgInput.oninput = () => { sendBtn.disabled = !msgInput.value.trim(); };

      setTimeout(() => { document.getElementById('global-loader').style.display = 'none'; }, 800);
    });
  </script>
</body>
</html>
