<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Support — BluePay</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .chat-container { height: 60vh; display: flex; flex-direction: column; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.4; }
        .msg-agent { align-self: flex-start; background: var(--bg3); border: 1px solid var(--border); }
        .msg-user { align-self: flex-end; background: var(--blue); color: white; }
    </style>
</head>
<body data-page="support">
    <div id="global-loader"><div class="spinner"></div></div>
    <aside class="sidebar"></aside>
    <header class="mobile-header"></header>

    <main class="main-content">
        <div class="reveal" style="margin-bottom: 30px;">
            <h1>Help Center</h1>
            <p style="color: var(--muted2);">Chat with your dedicated support agent.</p>
        </div>

        <div class="card reveal" style="padding: 0; overflow: hidden; display: flex; flex-direction: column; height: 75vh;">
            <div class="flex-between" style="padding: 15px 25px; background: var(--bg3); border-bottom: 1px solid var(--border);">
                <div class="flex" style="gap: 12px;">
                    <div id="agent-icon" style="width: 40px; height: 40px; border-radius: 50%; background: var(--blue); display: flex; align-items: center; justify-content: center; font-weight: 800;">SA</div>
                    <div>
                        <h4 id="agent-name">Support Agent</h4>
                        <p style="font-size: 11px; color: var(--green);">● Online</p>
                    </div>
                </div>
            </div>

            <div class="chat-messages" id="chat-box"></div>

            <div style="padding: 20px; border-top: 1px solid var(--border); background: var(--bg2);">
                <form id="chat-form" class="flex" style="gap: 10px;">
                    <input type="text" id="chat-input" placeholder="Type your message..." style="flex: 1; background: var(--bg3); border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: white;">
                    <button type="submit" class="btn btn-primary" style="padding: 12px 20px;"><i class="fa-solid fa-paper-plane"></i></button>
                </form>
            </div>
        </div>
    </main>

    <nav class="bottom-nav"></nav>

    <script src="app.js" type="module"></script>
    <script type="module">
        import { auth, db, listenUser } from './firebase-config.js';
        import { collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        listenUser(auth.currentUser?.uid || "", (user) => {
            document.getElementById('agent-name').innerText = user.agentName || "Sarah Mitchell";
            document.getElementById('agent-icon').innerText = (user.agentName || "SA").split(' ').map(n => n[0]).join('');
        });

        const chatBox = document.getElementById('chat-box');
        const q = query(collection(db, "support", auth.currentUser?.uid || "void", "messages"), orderBy("createdAt", "asc"));
        
        onSnapshot(q, (snap) => {
            chatBox.innerHTML = snap.docs.map(doc => {
                const m = doc.data();
                return `<div class="msg ${m.isAdmin ? 'msg-agent' : 'msg-user'}">${m.text}</div>`;
            }).join('');
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        document.getElementById('chat-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('chat-input');
            if (!input.value.trim()) return;

            await addDoc(collection(db, "support", auth.currentUser.uid, "messages"), {
                text: input.value,
                isAdmin: false,
                createdAt: serverTimestamp()
            });
            input.value = "";
        };
    </script>
</body>
</html>
