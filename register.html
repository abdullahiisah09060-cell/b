<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join BluePay — Claim ₦200k Bonus</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="register">
    <div id="global-loader"><div class="spinner"></div></div>
    
    <div class="flex-center" style="min-height: 100vh; padding: 40px 20px;">
        <div class="card reveal" style="width: 100%; max-width: 480px; padding: 40px;">
            <div style="text-align: center; margin-bottom: 30px;">
                <h2 style="font-size: 32px;">Create Account</h2>
                <p style="margin-top: 8px; color: var(--green); font-weight: 800;">Get ₦200,000 Bonus Instantly</p>
            </div>

            <button onclick="handleGoogleAuth()" class="btn btn-outline" style="width: 100%; gap: 12px; background: white; color: black; border: 1px solid #ddd; margin-bottom: 25px;">
                <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.712c-.18-.54-.282-1.117-.282-1.712s.102-1.172.282-1.712V4.956H.957a8.996 8.996 0 0 0 0 8.088l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.582C13.463.891 11.426 0 9 0 5.482 0 2.443 2.048.957 4.956L3.964 7.29c.708-2.127 2.692-3.71 5.036-3.71z" fill="#EA4335"/></svg>
                Sign up with Google
            </button>

            <form id="reg-form">
                <div class="auth-input-group"><label>Full Name</label><input type="text" id="reg-name" placeholder="John Doe" required></div>
                <div class="auth-input-group"><label>Email Address</label><input type="email" id="reg-email" placeholder="email@example.com" required></div>
                <div class="auth-input-group"><label>Phone Number</label><input type="tel" id="reg-phone" placeholder="080 1234 5678" required></div>
                <div class="auth-input-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" placeholder="Min. 8 Characters" required>
                    <i class="fa-solid fa-eye-slash eye-toggle" style="position: absolute; right: 15px; top: 42px; cursor: pointer;"></i>
                </div>
                <div class="auth-input-group"><label>Confirm Password</label><input type="password" id="reg-confirm" required></div>
                <div class="auth-input-group"><label>Referral Code (Optional)</label><input type="text" id="reg-referral"></div>
                
                <label class="flex" style="gap: 10px; margin-bottom: 25px; cursor: pointer; font-size: 13px;">
                    <input type="checkbox" required> <span>I agree to the <a href="terms.html" class="gold-text">Terms of Service</a></span>
                </label>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
            </form>

            <p style="text-align: center; margin-top: 30px; font-size: 14px;">Existing User? <a href="login.html" style="font-weight: 800; color: var(--blue2);">Sign In</a></p>
        </div>
    </div>

    <script src="auth.js" type="module"></script>
    <script type="module">import { handleGoogleAuth } from './auth.js'; window.handleGoogleAuth = handleGoogleAuth;</script>
</body>
</html>
