<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Your Account — BluePay</title>
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; background: radial-gradient(circle at top right, rgba(26,86,219,0.08), transparent 50%); }
    .auth-card { width: 100%; max-width: 480px; }
  </style>
</head>
<body data-page="register">
  <div id="global-loader"><div class="spinner"></div></div>
  <div class="auth-page">
    <div class="card auth-card reveal">
      <div style="text-align: center; margin-bottom: 35px;">
        <a href="index.html" class="flex" style="justify-content: center; gap: 10px; margin-bottom: 25px; align-items: center;">
          <div style="width: 38px; height: 38px; background: var(--blue); border-radius: 10px; display: flex; align-items: center; justify-content: center;"><i class="fa-solid fa-b" style="color: white;"></i></div>
          <span style="font-size: 22px; font-weight: 900;">BluePay</span>
        </a>
        <h2 style="font-size: 28px; margin-bottom: 10px;">Create Account</h2>
        <p style="color: var(--green); font-weight: 800;">Get ₦200,000 Welcome Bonus</p>
      </div>

      <button id="google-reg" class="btn btn-outline" style="width: 100%; margin-bottom: 25px; gap: 15px; font-weight: 600;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Logo.svg" width="20" alt="Google"> Continue with Google
      </button>

      <div class="flex" style="margin-bottom: 25px; align-items: center; gap: 15px;">
        <div style="flex: 1; height: 1px; background: var(--border);"></div>
        <span style="font-size: 11px; font-weight: 800; color: var(--muted);">OR USE EMAIL</span>
        <div style="flex: 1; height: 1px; background: var(--border);"></div>
      </div>

      <form id="reg-form">
        <div class="auth-input-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="John Doe" required>
        </div>
        <div class="auth-input-group">
          <label>Email Address</label>
          <input type="email" id="reg-email" placeholder="john@example.com" required>
        </div>
        <div class="auth-input-group">
          <label>Phone Number</label>
          <input type="tel" id="reg-phone" placeholder="080 1234 5678" required>
        </div>
        <div class="auth-input-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="At least 8 characters" required>
          <i class="fa-solid fa-eye-slash eye-toggle" style="position: absolute; right: 18px; top: 44px; color: var(--muted); cursor: pointer;"></i>
          <div style="height: 4px; background: var(--bg4); border-radius: 2px; margin-top: 10px; overflow: hidden;"><div id="strength-bar" style="height: 100%; width: 0%; transition: 0.4s;"></div></div>
          <p id="strength-text" style="font-size: 11px; margin-top: 5px; font-weight: 700;"></p>
        </div>
        <div class="auth-input-group">
          <label>Confirm Password</label>
          <input type="password" id="reg-confirm" placeholder="Repeat your password" required>
          <i class="fa-solid fa-eye-slash eye-toggle" style="position: absolute; right: 18px; top: 44px; color: var(--muted); cursor: pointer;"></i>
        </div>
        <div class="auth-input-group">
          <label>Referral Code (Optional)</label>
          <input type="text" id="reg-referral" placeholder="CODE-123">
        </div>

        <label style="display: flex; gap: 12px; font-size: 13px; color: var(--muted2); margin-bottom: 35px; cursor: pointer;">
          <input type="checkbox" id="reg-terms" style="margin-top: 4px;" required>
          <span>I agree to the <a href="terms.html" style="color: var(--blue2); font-weight: 700;">Terms</a> and <a href="privacy.html" style="color: var(--blue2); font-weight: 700;">Privacy Policy</a>.</span>
        </label>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account — Get ₦200k Bonus</button>
      </form>

      <p style="text-align: center; margin-top: 30px; font-size: 14px;">Already have an account? <a href="login.html" style="color: var(--blue2); font-weight: 800;">Sign In</a></p>
    </div>
  </div>
  <script src="auth.js" type="module"></script>
  <script type="module">
    window.onload = () => {
      document.getElementById('global-loader').style.display = 'none';
      document.querySelector('.reveal').classList.add('revealed');
    };
  </script>
</body>
</html>
