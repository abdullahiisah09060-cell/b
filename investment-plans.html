<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Plans — BluePay</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="index">
    <div id="global-loader"><div class="spinner"></div></div>
    
    <header class="mobile-header" style="display: flex;">
        <a href="index.html" class="flex" style="gap: 10px;">
            <div style="width: 32px; height: 32px; background: var(--blue); border-radius: 8px; display: flex; align-items: center; justify-content: center;"><i class="fa-solid fa-b" style="color: white;"></i></div>
            <span style="font-size: 20px; font-weight: 900;">BluePay</span>
        </a>
    </header>

    <main class="container" style="padding-top: 120px; padding-bottom: 100px;">
        <div class="reveal" style="text-align: center; margin-bottom: 60px;">
            <h1 style="font-size: clamp(32px, 5vw, 48px); margin-bottom: 15px;">Pick your <span class="grad-text">profit path.</span></h1>
            <p style="color: var(--muted2); max-width: 600px; margin: 0 auto;">From entry-level savings to high-yield elite portfolios, choose a plan that matches your goals.</p>
        </div>

        <div class="grid" id="public-plans" style="grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px;">
            <!-- Skeletons -->
            <div class="skeleton" style="height: 300px;"></div>
            <div class="skeleton" style="height: 300px;"></div>
            <div class="skeleton" style="height: 300px;"></div>
        </div>
    </main>

    <script src="app.js" type="module"></script>
    <script type="module">
        import { INVESTMENT_PLANS, fmtN } from './firebase-config.js';
        const cont = document.getElementById('public-plans');
        cont.innerHTML = INVESTMENT_PLANS.map(p => `
            <div class="card reveal" style="border-color: ${p.roiPercent > 40 ? 'var(--border-gold)' : 'var(--border)'}">
                <span class="badge ${p.roiPercent > 40 ? 'badge-warning' : 'badge-pending'}">${p.name.toUpperCase()}</span>
                <h1 style="margin: 20px 0; font-size: 42px;" class="${p.roiPercent > 40 ? 'gold-text' : 'grad-text'}">${p.roiPercent}%</h1>
                <div class="flex-between" style="font-weight: 700; margin-bottom: 10px;"><span>Duration</span><span>${p.durationDays} Days</span></div>
                <div class="flex-between" style="font-weight: 700; margin-bottom: 25px;"><span>Min Entry</span><span>${fmtN(p.min)}</span></div>
                <a href="register.html" class="btn btn-primary" style="width: 100%;">Start Investing</a>
            </div>
        `).join('');
    </script>
</body>
</html>
