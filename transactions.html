<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Transaction History | BluePay</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="transactions">
    <div id="global-loader"><div class="spinner"></div></div>
    <aside class="sidebar"></aside>
    <header class="mobile-header"></header>

    <main class="main-content">
        <div class="flex-between reveal" style="margin-bottom: 40px; flex-wrap: wrap; gap: 20px;">
            <div><h1>Vault Activity</h1><p>Detailed log of all credits and debits.</p></div>
            <button id="export-csv" class="btn btn-outline" style="min-height: 40px; font-size: 13px;"><i class="fa-solid fa-file-csv"></i> Export to CSV</button>
        </div>

        <div class="card reveal" style="margin-bottom: 30px; padding: 20px;">
            <div class="grid" style="grid-template-columns: 2fr 1fr; gap: 15px;">
                <input type="text" id="tx-search" class="auth-input-group" placeholder="Search description..." style="margin:0; padding:12px; background:var(--bg3); border:1px solid var(--border); border-radius:10px; color:white;">
                <select id="tx-filter" style="padding:0 15px; background:var(--bg3); border:1px solid var(--border); border-radius:10px; color:white;">
                    <option value="all">All Types</option>
                    <option value="deposit">Deposits</option>
                    <option value="withdrawal">Withdrawals</option>
                    <option value="daily_claim">ROI Claims</option>
                    <option value="bonus">Bonuses</option>
                </select>
            </div>
        </div>

        <div class="card reveal" style="padding: 0; overflow: hidden;">
            <div class="table-wrapper">
                <table style="width: 100%;">
                    <thead><tr><th>Date & Time</th><th>Activity</th><th>Amount</th><th>Status</th></tr></thead>
                    <tbody id="tx-full-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <nav class="bottom-nav"></nav>

    <script src="app.js" type="module"></script>
    <script type="module">
        import { auth, db, fmtN, fmtDate, requireAuth } from './firebase-config.js';
        import { initAppShell, showToast } from './components.js';
        import { collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        requireAuth(user => {
            initAppShell('transactions');
            let allTx = [];

            onSnapshot(query(collection(db, "transactions"), where("uid", "==", user.uid), orderBy("createdAt", "desc")), snap => {
                allTx = snap.docs.map(d => d.data());
                renderTable();
            });

            function renderTable() {
                const search = document.getElementById('tx-search').value.toLowerCase();
                const type = document.getElementById('tx-filter').value;
                const filtered = allTx.filter(tx => (type === 'all' || tx.type === type) && tx.description.toLowerCase().includes(search));

                document.getElementById('tx-full-body').innerHTML = filtered.map(tx => {
                    const isCredit = ["deposit", "bonus", "return", "daily_claim", "referral_bonus"].includes(tx.type);
                    return `<tr><td>${fmtDate(tx.createdAt)}</td><td><p style="font-weight:700; color:white;">${tx.description}</p><small style="opacity:0.5;">ID: ${tx.uid.substring(0,8)}</small></td><td style="font-weight:800; color:${isCredit ? 'var(--green)' : 'white'}">${isCredit ? '+' : '-'}${fmtN(tx.amount)}</td><td><span class="badge badge-success">${tx.status}</span></td></tr>`;
                }).join('');
            }

            document.getElementById('tx-search').oninput = renderTable;
            document.getElementById('tx-filter').onchange = renderTable;

            document.getElementById('export-csv').onclick = () => {
                let csv = "Date,Description,Amount,Status\n";
                allTx.forEach(t => csv += `"${fmtDate(t.createdAt)}","${t.description}","${t.amount}","${t.status}"\n`);
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `BluePay_History.csv`; a.click();
                showToast("CSV Downloaded", "success");
            };
        });
    </script>
</body>
</html>
