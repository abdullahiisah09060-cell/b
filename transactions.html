<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction History — BluePay</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="dashboard">
    <div id="global-loader"><div class="spinner"></div></div>
    <aside class="sidebar"></aside>
    <header class="mobile-header"></header>

    <main class="main-content">
        <div class="flex-between reveal" style="margin-bottom: 40px;">
            <h1>History</h1>
            <button onclick="exportCSV()" class="btn btn-outline" style="padding: 10px 20px; font-size: 13px;"><i class="fa-solid fa-file-csv"></i> Export CSV</button>
        </div>

        <div class="card reveal" style="padding: 0; overflow: hidden;">
            <div class="table-container">
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="background: var(--bg3); text-align: left;">
                            <th style="padding: 15px;">DATE</th>
                            <th style="padding: 15px;">TYPE</th>
                            <th style="padding: 15px;">DESCRIPTION</th>
                            <th style="padding: 15px;">AMOUNT</th>
                            <th style="padding: 15px;">STATUS</th>
                        </tr>
                    </thead>
                    <tbody id="tx-full-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <nav class="bottom-nav"></nav>
    <script src="app.js" type="module"></script>
    <script type="module">
        import { auth, db, fmtN } from './firebase-config.js';
        import { collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const q = query(collection(db, "transactions"), where("uid", "==", auth.currentUser?.uid || "void"), orderBy("createdAt", "desc"));
        onSnapshot(q, snap => {
            document.getElementById('tx-full-body').innerHTML = snap.docs.map(doc => {
                const tx = doc.data();
                return `
                    <tr style="border-bottom: 1px solid var(--border);">
                        <td style="padding: 15px; font-size: 13px;">${tx.createdAt?.toDate().toLocaleDateString() || '...'}</td>
                        <td style="padding: 15px;"><span class="badge badge-pending">${tx.type.toUpperCase()}</span></td>
                        <td style="padding: 15px; font-size: 13px;">${tx.description}</td>
                        <td style="padding: 15px; font-weight: 800;">${fmtN(tx.amount)}</td>
                        <td style="padding: 15px;"><span class="badge badge-success">${tx.status}</span></td>
                    </tr>
                `;
            }).join('');
        });
    </script>
</body>
</html>
