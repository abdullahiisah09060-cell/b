<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Withdraw Profits | BluePay Vault</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="withdraw">
    <div id="global-loader"><div class="spinner"></div></div>
    <aside class="sidebar"></aside>
    <header class="mobile-header"></header>

    <main class="main-content">
        <div class="reveal" style="margin-bottom: 40px;">
            <h1>Withdraw Funds</h1>
            <p>Available Balance: <b id="withdraw-bal" class="gold-text">₦0.00</b></p>
        </div>

        <div class="grid" style="grid-template-columns: 1.5fr 1fr; gap: 30px;">
            <div class="card reveal">
                <form id="withdraw-form">
                    <div class="auth-input-group">
                        <label>Beneficiary Bank</label>
                        <select id="w-bank" required>
                            <option value="">Select Bank...</option>
                            <option value="GTBank">GTBank</option>
                            <option value="Zenith Bank">Zenith Bank</option>
                            <option value="First Bank">First Bank</option>
                            <option value="Access Bank">Access Bank</option>
                            <option value="UBA">UBA</option>
                            <option value="Kuda">Kuda Bank</option>
                            <option value="Opay">Opay</option>
                            <option value="Palmpay">PalmPay</option>
                            <option value="Moniepoint">Moniepoint</option>
                        </select>
                    </div>
                    <div class="grid-2">
                        <div class="auth-input-group">
                            <label>Account Number</label>
                            <input type="number" id="w-account" placeholder="10 Digits" required>
                        </div>
                        <div class="auth-input-group">
                            <label>Account Holder Name</label>
                            <input type="text" id="w-name" placeholder="Full Legal Name" required>
                        </div>
                    </div>
                    <div class="grid-2">
                        <div class="auth-input-group">
                            <label>Withdrawal Amount (₦)</label>
                            <input type="number" id="w-amt" placeholder="Min 1,000" required>
                        </div>
                        <div class="auth-input-group">
                            <label>Validator Code (WDC)</label>
                            <div class="flex" style="gap: 10px;">
                                <input type="text" id="w-code" placeholder="WDC-XXXX..." required style="flex:1;">
                                <button type="button" id="btn-validate" class="btn btn-outline" style="min-height: 52px; padding: 0 15px;"><i class="fa-solid fa-shield-check"></i></button>
                            </div>
                        </div>
                    </div>
                    <button type="submit" id="withdraw-btn" class="btn btn-primary" style="width: 100%; margin-top: 20px; padding: 18px;">Submit Payout Request</button>
                </form>
            </div>

            <div class="grid" style="gap: 20px;">
                <div id="wdc-warning" class="card reveal" style="background: rgba(239,68,68,0.05); border-color: rgba(239,68,68,0.2);">
                    <i class="fa-solid fa-circle-exclamation" style="color:var(--red); font-size: 24px; margin-bottom: 15px;"></i>
                    <h4>Validator Required</h4>
                    <p style="font-size: 13px; margin: 10px 0 20px;">You need a fresh Validator Code for every payout request.</p>
                    <a href="buy-code.html" class="btn btn-gold" style="width: 100%; min-height: 40px; font-size: 13px;">Get Code Now</a>
                </div>
                <div class="card reveal">
                    <h4>Payout Policy</h4>
                    <ul style="font-size: 13px; margin-top: 15px; list-style: none;" class="grid">
                        <li class="flex" style="gap:10px;"><i class="fa-solid fa-clock" style="color:var(--blue2)"></i> Processing: 2-24 Hours</li>
                        <li class="flex" style="gap:10px;"><i class="fa-solid fa-shield" style="color:var(--blue2)"></i> Security code is single-use</li>
                        <li class="flex" style="gap:10px;"><i class="fa-solid fa-circle-info" style="color:var(--blue2)"></i> Min Withdrawal: ₦1,000</li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="card reveal" style="margin-top: 40px; padding: 0; overflow: hidden;">
            <div style="padding: 20px 25px; border-bottom: 1px solid var(--border);"><h3>Withdrawal History</h3></div>
            <div class="table-wrapper">
                <table style="width: 100%;">
                    <thead><tr><th>Date</th><th>Amount</th><th>Details</th><th>Status</th></tr></thead>
                    <tbody id="w-history-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <nav class="bottom-nav"></nav>

    <script src="app.js" type="module"></script>
    <script type="module">
        import { auth, db, fmtN, requireAuth, updateWallet, logTransaction } from './firebase-config.js';
        import { initAppShell, showToast, setLoading, showModal } from './components.js';
        import { collection, query, where, getDocs, updateDoc, doc, addDoc, serverTimestamp, orderBy, onSnapshot, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        requireAuth(async user => {
            initAppShell('withdraw');
            let currentBal = 0;

            onSnapshot(doc(db, "users", user.uid), snap => {
                currentBal = snap.data().balance;
                document.getElementById('withdraw-bal').innerText = fmtN(currentBal);
            });

            // Check for codes to hide/show warning
            const qCode = query(collection(db, "codes"), where("uid", "==", user.uid), where("used", "==", false));
            onSnapshot(qCode, snap => {
                const active = snap.docs.filter(d => d.data().expiresAt.toDate() > new Date());
                document.getElementById('wdc-warning').style.display = active.length > 0 ? 'none' : 'block';
            });

            document.getElementById('btn-validate').onclick = async () => {
                const codeVal = document.getElementById('w-code').value.trim();
                if(!codeVal) return;
                const q = query(collection(db, "codes"), where("code", "==", codeVal), where("used", "==", false));
                const snap = await getDocs(q);
                if(!snap.empty && snap.docs[0].data().expiresAt.toDate() > new Date()) {
                    showToast("Code Validated ✓", "success");
                    document.getElementById('btn-validate').innerHTML = `<i class="fa-solid fa-check" style="color:var(--green)"></i>`;
                } else {
                    showToast("Invalid or Expired Code", "error");
                }
            };

            document.getElementById('withdraw-form').onsubmit = async (e) => {
                e.preventDefault();
                const btn = document.getElementById('withdraw-btn');
                const amt = parseFloat(document.getElementById('w-amt').value);
                const codeVal = document.getElementById('w-code').value.trim();
                const acct = document.getElementById('w-account').value;

                if (amt < 1000) return showToast("Min ₦1,000", "warning");
                if (amt > currentBal) return showToast("Insufficient Balance", "error");
                if (acct.length !== 10) return showToast("Account number must be 10 digits", "warning");

                setLoading(btn, true, "Verifying validator...");

                try {
                    const q = query(collection(db, "codes"), where("code", "==", codeVal), where("used", "==", false));
                    const snap = await getDocs(q);
                    
                    if (snap.empty || snap.docs[0].data().expiresAt.toDate() < new Date()) {
                        throw new Error("Invalid or expired WDC code.");
                    }

                    const codeDoc = snap.docs[0];
                    const batch = writeBatch(db);

                    // 1. Create Withdrawal Record
                    const wRef = doc(collection(db, "withdrawals"));
                    batch.set(wRef, {
                        uid: user.uid, amount: amt, bank: document.getElementById('w-bank').value,
                        accountNumber: acct, accountName: document.getElementById('w-name').value,
                        status: "pending", code: codeVal, createdAt: serverTimestamp()
                    });

                    // 2. Mark Code Used
                    batch.update(codeDoc.ref, { used: true });

                    await batch.commit();

                    // 3. Deduct Balance
                    await updateWallet(user.uid, amt, 'debit', {
                        type: 'withdrawal',
                        description: `Payout to ${document.getElementById('w-bank').value}`,
                        status: 'pending'
                    });

                    showToast("Withdrawal request submitted!", "success");
                    e.target.reset();
                } catch (err) {
                    showToast(err.message, "error");
                } finally {
                    setLoading(btn, false, "Submit Payout Request");
                }
            };

            // History Listener
            const qH = query(collection(db, "withdrawals"), where("uid", "==", user.uid), orderBy("createdAt", "desc"));
            onSnapshot(qH, snap => {
                document.getElementById('w-history-body').innerHTML = snap.empty ? `<tr><td colspan="4" style="text-align:center; padding:40px;">No requests yet.</td></tr>` : 
                snap.docs.map(doc => {
                    const w = doc.data();
                    return `<tr><td>${w.createdAt ? w.createdAt.toDate().toLocaleDateString() : '...'}</td><td style="font-weight:800">${fmtN(w.amount)}</td><td>${w.bank}<br><small>${w.accountNumber}</small></td><td><span class="badge ${w.status === 'pending' ? 'badge-warning' : (w.status === 'completed' ? 'badge-success' : 'badge-danger')}">${w.status}</span></td></tr>`;
                }).join('');
            });
        });
    </script>
</body>
</html>
