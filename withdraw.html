<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw Payout — BluePay</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="withdraw">
    <div id="global-loader"><div class="spinner"></div></div>

    <aside class="sidebar"></aside>
    <header class="mobile-header"></header>

    <main class="main-content">
        <div class="reveal" style="margin-bottom: 40px;">
            <h1>Withdraw Funds</h1>
            <p style="color: var(--muted2);">Payouts are processed to your Nigerian bank account within 2-24 hours.</p>
        </div>

        <div class="grid" style="grid-template-columns: 1.5fr 1fr; gap: 30px;">
            <div class="card reveal">
                <form id="withdraw-form">
                    <div class="auth-input-group">
                        <label>Select Bank</label>
                        <select id="bank-name" required>
                            <option value="">Select Bank...</option>
                            <option value="Access Bank">Access Bank</option>
                            <option value="GTBank">GTBank</option>
                            <option value="Zenith Bank">Zenith Bank</option>
                            <option value="Kuda Bank">Kuda Bank</option>
                            <option value="Moniepoint">Moniepoint</option>
                            <option value="Opay">Opay</option>
                            <option value="Palmpay">Palmpay</option>
                        </select>
                    </div>
                    <div class="grid-2">
                        <div class="auth-input-group">
                            <label>Account Number</label>
                            <input type="number" id="account-number" placeholder="0123456789" required>
                        </div>
                        <div class="auth-input-group">
                            <label>Account Holder Name</label>
                            <input type="text" id="account-name" placeholder="John Doe" required>
                        </div>
                    </div>
                    <div class="grid-2">
                        <div class="auth-input-group">
                            <label>Withdrawal Amount (₦)</label>
                            <input type="number" id="withdraw-amount" placeholder="Min 1,000" min="1000" required>
                        </div>
                        <div class="auth-input-group">
                            <label>Security Code</label>
                            <input type="text" id="withdraw-code" placeholder="WDC-XXXX-XXXX" required>
                        </div>
                    </div>
                    <button type="submit" id="w-submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">Request Payout</button>
                </form>
            </div>

            <div class="grid" style="gap: 20px;">
                <div class="card reveal" style="background: rgba(212,175,55,0.05); border-color: var(--border-gold);">
                    <h4 style="color: var(--gold); margin-bottom: 15px;"><i class="fa-solid fa-circle-info"></i> Payout Policy</h4>
                    <ul style="font-size: 13px; color: var(--muted2); list-style: none;">
                        <li style="margin-bottom: 10px;">• Minimum withdrawal: ₦1,000</li>
                        <li style="margin-bottom: 10px;">• Withdrawal codes are required</li>
                        <li style="margin-bottom: 10px;">• Requests are manually reviewed</li>
                        <li>• 24/7 Processing active</li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="card reveal" style="margin-top: 40px; padding: 0; overflow: hidden;">
            <div style="padding: 20px; border-bottom: 1px solid var(--border);"><h3>Withdrawal History</h3></div>
            <div id="w-history-list" style="padding: 10px;">
                <p style="text-align: center; padding: 30px; color: var(--muted2);">No withdrawal history yet.</p>
            </div>
        </div>
    </main>

    <nav class="bottom-nav"></nav>

    <script src="app.js" type="module"></script>
    <script type="module">
        import { auth, db, toast, fmtN } from './firebase-config.js';
        import { collection, query, where, getDocs, updateDoc, doc, addDoc, serverTimestamp, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { toggleLoader } from './components.js';

        const form = document.getElementById('withdraw-form');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('w-submit');
            const amt = parseFloat(document.getElementById('withdraw-amount').value);
            const codeVal = document.getElementById('withdraw-code').value.trim();

            toggleLoader(true, btn);

            try {
                // 1. Verify Code
                const q = query(collection(db, "codes"), where("code", "==", codeVal), where("uid", "==", auth.currentUser.uid), where("used", "==", false));
                const snap = await getDocs(q);

                if (snap.empty) throw new Error("Invalid or used security code.");
                const codeDoc = snap.docs[0];
                if (codeDoc.data().expiresAt.toDate() < new Date()) throw new Error("Security code has expired.");

                // 2. Check Balance
                const userSnap = await getDocs(query(collection(db, "users"), where("uid", "==", auth.currentUser.uid)));
                const userData = userSnap.docs[0].data();
                if (userData.balance < amt) throw new Error("Insufficient wallet balance.");

                // 3. Process Transaction (Transaction for atomicity is ideal here)
                await addDoc(collection(db, "withdrawals"), {
                    uid: auth.currentUser.uid,
                    amount: amt,
                    bank: document.getElementById('bank-name').value,
                    accountNumber: document.getElementById('account-number').value,
                    accountName: document.getElementById('account-name').value,
                    status: "pending",
                    code: codeVal,
                    createdAt: serverTimestamp()
                });

                // Mark code as used and debit balance
                await updateDoc(doc(db, "codes", codeDoc.id), { used: true });
                await updateDoc(doc(db, "users", userSnap.docs[0].id), { 
                    balance: userData.balance - amt,
                    totalWithdrawn: userData.totalWithdrawn + amt
                });

                toast("Withdrawal request submitted!", "success");
                form.reset();
            } catch (err) {
                toast(err.message, "error");
            } finally {
                toggleLoader(false, btn);
            }
        };

        // Real-time History
        const whq = query(collection(db, "withdrawals"), where("uid", "==", auth.currentUser?.uid || ""), orderBy("createdAt", "desc"));
        onSnapshot(whq, (snap) => {
            const cont = document.getElementById('w-history-list');
            if (snap.empty) return;
            cont.innerHTML = snap.docs.map(doc => {
                const w = doc.data();
                return `
                    <div class="flex-between" style="padding: 15px; border-bottom: 1px solid var(--border);">
                        <div>
                            <p style="font-weight: 700;">${fmtN(w.amount)}</p>
                            <p style="font-size: 11px; color: var(--muted2);">${w.bank} • ${w.status.toUpperCase()}</p>
                        </div>
                        <span class="badge ${w.status === 'pending' ? 'badge-warning' : 'badge-success'}">${w.status}</span>
                    </div>
                `;
            }).join('');
        });
    </script>
</body>
</html>
