<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — BluePay</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="login">
    <div id="global-loader"><div class="spinner"></div></div>
    
    <div class="flex-center" style="min-height: 100vh; padding: 20px;">
        <div class="card reveal" style="width: 100%; max-width: 420px; padding: 40px;">
            <div style="text-align: center; margin-bottom: 30px;">
                <div style="width: 50px; height: 50px; background: var(--blue); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                    <i class="fa-solid fa-b" style="color: white; font-size: 24px;"></i>
                </div>
                <h2 style="font-size: 28px;">Welcome Back</h2>
                <p style="margin-top: 8px;">Access your investment portfolio</p>
            </div>

            <button onclick="handleGoogleAuth()" class="btn btn-outline" style="width: 100%; gap: 12px; background: white; color: black; border: 1px solid #ddd; margin-bottom: 25px;">
                <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.712c-.18-.54-.282-1.117-.282-1.712s.102-1.172.282-1.712V4.956H.957a8.996 8.996 0 0 0 0 8.088l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.582C13.463.891 11.426 0 9 0 5.482 0 2.443 2.048.957 4.956L3.964 7.29c.708-2.127 2.692-3.71 5.036-3.71z" fill="#EA4335"/></svg>
                Sign in with Google
            </button>

            <div class="flex" style="margin-bottom: 25px; align-items: center; gap: 15px;">
                <div style="flex: 1; height: 1px; background: var(--border);"></div>
                <span style="font-size: 11px; font-weight: 800; color: var(--muted);">OR EMAIL</span>
                <div style="flex: 1; height: 1px; background: var(--border);"></div>
            </div>

            <form id="login-form">
                <div class="auth-input-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" placeholder="investor@example.com" required>
                </div>
                <div class="auth-input-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                    <i class="fa-solid fa-eye-slash eye-toggle" style="position: absolute; right: 15px; top: 42px; cursor: pointer; color: var(--muted);"></i>
                </div>
                <div style="text-align: right; margin-bottom: 25px;">
                    <a href="forgot-password.html" style="font-size: 13px; font-weight: 700; color: var(--blue2);">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
            </form>

            <p style="text-align: center; margin-top: 30px; font-size: 14px;">New to BluePay? <a href="register.html" style="font-weight: 800; color: var(--blue2);">Create Account</a></p>
        </div>
    </div>

    <script src="auth.js" type="module"></script>
    <script type="module">
        import { handleGoogleAuth } from './auth.js';
        window.handleGoogleAuth = handleGoogleAuth;
    </script>
</body>
</html>
