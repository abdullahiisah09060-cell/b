<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — BluePay</title>
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="login">
  <div id="global-loader"><div class="spinner"></div></div>
  <div class="auth-page" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div class="card reveal" style="width: 100%; max-width: 440px;">
      <div style="text-align: center; margin-bottom: 35px;">
        <a href="index.html" class="flex" style="justify-content: center; gap: 10px; margin-bottom: 25px; align-items: center;">
          <div style="width: 38px; height: 38px; background: var(--blue); border-radius: 10px; display: flex; align-items: center; justify-content: center;"><i class="fa-solid fa-b" style="color: white;"></i></div>
          <span style="font-size: 22px; font-weight: 900;">BluePay</span>
        </a>
        <h2 style="font-size: 28px; margin-bottom: 10px;">Welcome Back</h2>
        <p>Log in to manage your portfolio</p>
      </div>

      <button id="google-login" class="btn btn-outline" style="width: 100%; margin-bottom: 30px; gap: 15px;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Logo.svg" width="20" alt="Google"> Sign In with Google
      </button>

      <form id="login-form">
        <div class="auth-input-group">
          <label>Email Address</label>
          <input type="email" id="login-email" placeholder="name@example.com" required>
        </div>
        <div class="auth-input-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="Enter your password" required>
          <i class="fa-solid fa-eye-slash eye-toggle" style="position: absolute; right: 18px; top: 44px; color: var(--muted); cursor: pointer;"></i>
        </div>
        <div style="text-align: right; margin-bottom: 35px;">
          <a href="forgot-password.html" style="font-size: 13px; color: var(--blue2); font-weight: 700;">Forgot Password?</a>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In to Dashboard</button>
      </form>

      <p style="text-align: center; margin-top: 30px; font-size: 14px;">Don't have an account? <a href="register.html" style="color: var(--blue2); font-weight: 800;">Get Started</a></p>
    </div>
  </div>
  <script src="auth.js" type="module"></script>
  <script type="module">
    window.onload = () => {
      document.getElementById('global-loader').style.display = 'none';
      document.querySelector('.reveal').classList.add('revealed');
    };
  </script>
</body>
</html>
