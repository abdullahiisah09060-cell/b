<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — BluePay</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="dashboard">
    <div id="global-loader"><div class="spinner"></div></div>

    <aside class="sidebar"></aside>
    <header class="mobile-header">
        <div class="flex" style="gap: 10px;">
            <div style="width: 32px; height: 32px; background: var(--blue); border-radius: 8px; display: flex; align-items: center; justify-content: center;"><i class="fa-solid fa-b" style="color: white; font-size: 14px;"></i></div>
            <span style="font-size: 18px; font-weight: 900;">BluePay</span>
        </div>
        <a href="notifications.html" style="position: relative;">
            <i class="fa-solid fa-bell" style="font-size: 22px;"></i>
            <span id="notif-dot" style="display:none; position:absolute; top:0; right:0; width:10px; height:10px; background:var(--red); border-radius:50%; border:2px solid var(--bg2);"></span>
        </a>
    </header>

    <main class="main-content">
        <div class="reveal" style="margin-bottom: 30px;">
            <h1 id="user-greet">Good Day, Investor</h1>
            <p style="color: var(--muted2);">Here is your portfolio summary.</p>
        </div>

        <div class="card reveal" style="background: linear-gradient(135deg, var(--bg3), var(--bg4)); padding: 30px; border: 1px solid var(--border-blue); margin-bottom: 30px;">
            <p style="font-size: 12px; font-weight: 800; color: var(--muted2); letter-spacing: 1px;">TOTAL BALANCE</p>
            <div class="flex-between" style="margin: 15px 0 25px;">
                <h1 id="bal-display" style="font-size: 42px;">₦0.00</h1>
                <i id="bal-toggle" class="fa-solid fa-eye" style="cursor:pointer; font-size: 20px; color: var(--muted);"></i>
            </div>
            <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 20px; padding-top: 25px; border-top: 1px solid var(--border);">
                <div>
                    <p style="font-size: 11px; font-weight: 700; color: var(--muted2);">EARNED</p>
                    <h3 id="stat-earned" style="color: var(--green);">₦0.00</h3>
                </div>
                <div>
                    <p style="font-size: 11px; font-weight: 700; color: var(--muted2);">INVESTED</p>
                    <h3 id="stat-invested" class="grad-text">₦0.00</h3>
                </div>
                <div>
                    <p style="font-size: 11px; font-weight: 700; color: var(--muted2);">WITHDRAWN</p>
                    <h3 id="stat-withdrawn" style="color: var(--orange);">₦0.00</h3>
                </div>
            </div>
        </div>

        <!-- Quick Actions (Intentional Mobile Grid) -->
        <div class="grid-2 reveal" style="margin-bottom: 30px;">
            <a href="deposit.html" class="card flex-center" style="flex-direction: column; gap: 10px; padding: 25px;">
                <i class="fa-solid fa-plus-circle" style="font-size: 28px; color: var(--blue2);"></i>
                <span style="font-weight: 700;">Deposit</span>
            </a>
            <a href="invest.html" class="card flex-center" style="flex-direction: column; gap: 10px; padding: 25px;">
                <i class="fa-solid fa-chart-line" style="font-size: 28px; color: var(--gold);"></i>
                <span style="font-weight: 700;">Invest</span>
            </a>
            <a href="withdraw.html" class="card flex-center" style="flex-direction: column; gap: 10px; padding: 25px;">
                <i class="fa-solid fa-bank" style="font-size: 28px; color: var(--green);"></i>
                <span style="font-weight: 700;">Withdraw</span>
            </a>
            <a href="buy-code.html" class="card flex-center" style="flex-direction: column; gap: 10px; padding: 25px;">
                <i class="fa-solid fa-key" style="font-size: 28px; color: var(--purple);"></i>
                <span style="font-weight: 700;">Buy Code</span>
            </a>
        </div>

        <div class="card reveal">
            <h3 style="margin-bottom: 20px;">Recent Activity</h3>
            <div id="tx-history" style="display: flex; flex-direction: column; gap: 15px;">
                <!-- Skeletons -->
                <div class="skeleton" style="height: 60px; width: 100%;"></div>
                <div class="skeleton" style="height: 60px; width: 100%;"></div>
            </div>
        </div>
    </main>

    <nav class="bottom-nav"></nav>

    <script src="app.js" type="module"></script>
    <script type="module">
        import { auth, db, listenUser, fmtN, toast } from './firebase-config.js';
        import { collection, query, where, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let balanceHidden = false;
        let rawBalance = 0;

        listenUser(auth.currentUser?.uid || "", (user) => {
            if (!user) return;
            rawBalance = user.balance;
            document.getElementById('user-greet').innerText = `Welcome, ${user.displayName.split(' ')[0]}`;
            updateBalanceUI();
            document.getElementById('stat-earned').innerText = fmtN(user.totalEarned);
            document.getElementById('stat-invested').innerText = fmtN(user.totalInvested);
            document.getElementById('stat-withdrawn').innerText = fmtN(user.totalWithdrawn);
        });

        function updateBalanceUI() {
            document.getElementById('bal-display').innerText = balanceHidden ? "₦ • • • •" : fmtN(rawBalance);
        }

        document.getElementById('bal-toggle').onclick = () => {
            balanceHidden = !balanceHidden;
            document.getElementById('bal-toggle').className = `fa-solid ${balanceHidden ? 'fa-eye-slash' : 'fa-eye'}`;
            updateBalanceUI();
        };

        // Real-time History
        const q = query(collection(db, "transactions"), where("uid", "==", auth.currentUser?.uid || ""), orderBy("createdAt", "desc"), limit(5));
        onSnapshot(q, (snap) => {
            const cont = document.getElementById('tx-history');
            if (snap.empty) {
                cont.innerHTML = "<p style='text-align:center; padding:20px;'>No activity yet.</p>";
                return;
            }
            cont.innerHTML = snap.docs.map(doc => {
                const tx = doc.data();
                return `
                    <div class="flex-between" style="padding: 10px 0; border-bottom: 1px solid var(--border);">
                        <div class="flex" style="gap: 12px;">
                            <div style="width: 35px; height: 35px; border-radius: 8px; background: var(--bg3); display: flex; align-items: center; justify-content: center;"><i class="fa-solid fa-exchange"></i></div>
                            <div><p style="font-size: 14px; font-weight: 700;">${tx.description}</p><p style="font-size: 11px; color: var(--muted2);">${tx.status}</p></div>
                        </div>
                        <span style="font-weight: 800; color: ${tx.type === 'deposit' || tx.type === 'bonus' ? 'var(--green)' : 'white'}">${tx.type === 'deposit' || tx.type === 'bonus' ? '+' : '-'}${fmtN(tx.amount)}</span>
                    </div>
                `;
            }).join('');
        });
    </script>
</body>
</html>
